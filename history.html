<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>더치페이 기록</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F7F8;--card:#fff;--label:#111;--label2:#666;--label3:#B0B0B8;
  --sep:#EBEBED;--sep2:#D4D4D8;--fill:#F3F3F5;--fill2:#F8F8FA;
  --blue:#0071E3;--blue-bg:#EBF3FF;--blue-txt:#0055B8;
  --green:#1DAD53;--green-bg:#EDFAF3;--green-txt:#13823D;
  --red:#E53E3E;--red-bg:#FFF0F0;
  --r:16px;--rm:10px;--rs:9px;
}
html,body{background:var(--bg);font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;font-size:14px;color:var(--label);min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
svg{display:block;flex-shrink:0;}
a{color:var(--blue);text-decoration:none;}

.shell{max-width:680px;margin:0 auto;padding:max(24px,env(safe-area-inset-top)) 16px max(40px,env(safe-area-inset-bottom));}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.hdr-left{display:flex;flex-direction:column;gap:2px;}
.hdr-back{font-size:13px;color:var(--blue);font-weight:500;margin-bottom:6px;display:inline-flex;align-items:center;gap:3px;width:fit-content;}
.hdr-back:hover{opacity:.7;}
.hdr-title{font-size:22px;font-weight:700;letter-spacing:-.4px;}
.hdr-sub{font-size:12px;color:var(--label3);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--label3);padding:5px 10px;border:1px solid var(--sep);background:var(--card);border-radius:20px;white-space:nowrap;}
.badge.connected{color:var(--green-txt);border-color:var(--green);background:var(--green-bg);}
.badge.syncing{color:var(--blue-txt);border-color:var(--blue);background:var(--blue-bg);}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--sep);background:var(--card);color:var(--label2);display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.icon-btn:hover{background:var(--fill);color:var(--label);}

/* Record cards */
.record-list{display:flex;flex-direction:column;gap:10px;}
.record-card{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;}
.rc-hd{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;transition:background .12s;}
.rc-hd:hover{background:var(--fill2);}
.rc-meta{flex:1;min-width:0;}
.rc-date{font-size:11px;color:var(--label3);margin-bottom:3px;}
.rc-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.rc-people{font-size:12px;color:var(--label2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.rc-total{font-size:18px;font-weight:700;white-space:nowrap;}
.rc-total.neg{color:var(--red);}
.rc-chevron{font-size:11px;color:var(--label3);transition:transform .2s;}
.rc-chevron.open{transform:rotate(180deg);}
.rc-body{border-top:1px solid var(--sep);display:none;}
.rc-body.open{display:block;}
.rc-section-title{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;padding:10px 16px 6px;}
.rc-item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--sep);gap:10px;}
.rc-item-row:last-child{border-bottom:none;}
.rc-item-info{flex:1;min-width:0;}
.rc-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-item-meta{font-size:11px;color:var(--label3);margin-top:1px;}
.rc-item-amt{font-size:13px;font-weight:600;flex-shrink:0;}
.rc-item-amt.neg{color:var(--red);}
.rc-txns{padding:0 0 4px;}
.rc-txn-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--sep);font-size:13px;}
.rc-txn-row:last-child{border-bottom:none;}
.rc-txn-people{display:flex;align-items:center;gap:6px;color:var(--label);}
.rc-txn-amt{font-weight:600;flex-shrink:0;}
.rc-no-txn{font-size:13px;color:var(--green);padding:10px 16px;text-align:center;}
.rc-foot{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;background:var(--fill2);border-top:1px solid var(--sep);}
.rc-saved-at{font-size:11px;color:var(--label3);}
.rc-del-btn{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;}
.rc-del-btn:hover{opacity:.7;}

/* Empty */
.empty-wrap{text-align:center;padding:80px 20px;color:var(--label3);}
.empty-wrap svg{margin:0 auto 14px;}
.empty-wrap p{font-size:14px;line-height:1.8;}
.empty-wrap strong{color:var(--label2);}

/* Dropbox 설정 패널 */
.dbx-panel{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;margin-top:20px;}
.dbx-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.dbx-panel-hd:hover{background:var(--fill2);}
.dbx-panel-title{font-size:13px;font-weight:600;color:var(--label);}
.dbx-panel-sub{font-size:12px;color:var(--label3);margin-top:1px;}
.dbx-chevron{color:var(--label3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.dbx-chevron.open{transform:rotate(180deg);}
.dbx-panel-body{padding:16px;border-top:1px solid var(--sep);}
.dbx-field{margin-bottom:14px;}
.dbx-label{font-size:11px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
.dbx-inp{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;font-family:inherit;}
.dbx-inp:focus{border-color:var(--blue);}
.dbx-guide{font-size:12px;color:var(--label3);line-height:1.65;margin-top:6px;}
.dbx-guide code{font-size:11px;background:var(--fill);padding:2px 5px;border-radius:4px;font-family:monospace;word-break:break-all;}
.dbx-btn{width:100%;border:none;border-radius:var(--rs);padding:11px;font-size:14px;font-weight:600;background:var(--label);color:#fff;cursor:pointer;transition:opacity .12s;}
.dbx-btn:hover{opacity:.88;}
.dbx-btn.secondary{background:var(--fill);color:var(--label);border:1px solid var(--sep2);}
.dbx-btn.secondary:hover{background:var(--fill2);}
.dbx-btn.danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.dbx-account{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--green-bg);border:1px solid var(--green);border-radius:var(--rs);margin-bottom:12px;}
.dbx-account-info{flex:1;min-width:0;}
.dbx-account-name{font-size:13px;font-weight:600;color:var(--green-txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-account-email{font-size:11px;color:var(--green-txt);opacity:.8;}
.dbx-disconnect{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;flex-shrink:0;}
.dbx-sync-row{display:flex;gap:8px;margin-bottom:8px;}
.dbx-sync-row .dbx-btn{flex:1;padding:9px;}
.dbx-btn-row{display:flex;gap:8px;}
.dbx-btn-row .dbx-btn{flex:1;}

/* Sync info */
.sync-info{font-size:12px;color:var(--label3);text-align:center;margin-top:14px;padding-bottom:4px;}

/* Toast */
.toast-wrap{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:calc(100% - 32px);max-width:420px;}
.toast{background:var(--label);color:#fff;padding:11px 16px;border-radius:10px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:auto;opacity:0;transform:translateY(16px);transition:opacity .22s,transform .22s;line-height:1.4;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}

@media(max-width:500px){
  .hdr-title{font-size:19px;}
  .rc-total{font-size:16px;}
}
</style>
</head>
<body>
<div class="shell">

  <!-- 헤더 -->
  <div class="hdr">
    <div class="hdr-left">
      <a href="index.html" class="hdr-back">← 더치페이</a>
      <div class="hdr-title">기록 보관함</div>
      <div class="hdr-sub">더치페이 정산 기록</div>
    </div>
    <div class="hdr-right">
      <div class="badge" id="dbxBadge">Dropbox 미연결</div>
      <button class="icon-btn" onclick="togglePanel()" title="Dropbox 설정">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <!-- 기록 목록 -->
  <div id="recordList"></div>

  <!-- Dropbox 설정 패널 -->
  <div class="dbx-panel" id="dbxPanel" style="display:none">
    <div class="dbx-panel-hd" onclick="togglePanelBody()">
      <div>
        <div class="dbx-panel-title">Dropbox 동기화</div>
        <div class="dbx-panel-sub">기기 간 기록 자동 백업</div>
      </div>
      <span class="dbx-chevron open" id="dbxChevron">▼</span>
    </div>
    <div class="dbx-panel-body" id="dbxPanelBody">
      <div id="dbxContent"></div>
    </div>
  </div>

  <div class="sync-info" id="syncInfo"></div>

</div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── 상수 ──
const HISTORY_KEY = 'dutchpay_history';
const DBX_APPKEY  = 'dutchpay_dbx_appkey';
const DBX_TOKEN   = 'dutchpay_dbx_token';
const DBX_REFRESH = 'dutchpay_dbx_refresh';
const DBX_ACCOUNT = 'dutchpay_dbx_account';
const DBX_LASTSYNC = 'dutchpay_dbx_lastsync';
const DBX_FILE    = '/dutch-pay_history.json';

// ── 유틸 ──
const svgArrow = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
const svgDropbox = '<svg width="16" height="16" viewBox="0 0 40 40" fill="#0061FF"><path d="M20 7.5L10 13.75 20 20 10 26.25 20 32.5 30 26.25 20 20 30 13.75 20 7.5zM10 26.25L0 20l10-6.25L0 7.5 10 1.25 20 7.5 10 13.75 20 20 10 26.25zM30 26.25L20 20l10-6.25L20 7.5l10 6.25L40 7.5 30 13.75 40 20 30 26.25 40 32.5 30 38.75 20 32.5z"/></svg>';

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtDate(iso){if(!iso)return '';const[y,m,d]=iso.split('-');return `${y}.${m}.${d}`;}
function fmtDateShort(iso){if(!iso)return '';return iso.slice(2).replace(/-/g,'.');}
function fmtSavedAt(iso){if(!iso)return '';try{const d=new Date(iso);return d.toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}

// ── 기록 저장소 ──
function loadHistory(){
  try{const raw=localStorage.getItem(HISTORY_KEY);return raw?JSON.parse(raw):[];}catch(e){return [];}
}
function saveHistory(arr){
  localStorage.setItem(HISTORY_KEY,JSON.stringify(arr));
}

function deleteRecord(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  const arr=loadHistory().filter(r=>r.id!==id);
  saveHistory(arr);
  render();
  toast('기록이 삭제됐어요');
  if(dbxGetToken()) syncDropbox(true);
}

// ── 렌더 ──
function toggleCard(id){
  const body=document.getElementById('rcb_'+id);
  const chev=document.getElementById('rcc_'+id);
  if(!body)return;
  const open=body.classList.toggle('open');
  if(chev)chev.className='rc-chevron'+(open?' open':'');
}

function render(){
  const records=loadHistory();
  const el=document.getElementById('recordList');
  if(!records.length){
    el.innerHTML=`<div class="empty-wrap">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" color="#B0B0B8">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
      <p><strong>아직 저장된 기록이 없어요</strong><br>
      더치페이 앱의 <strong>공유 탭</strong>에서<br>
      "기록 보관함에 저장"을 눌러보세요.</p>
      <div style="margin-top:16px">
        <a href="index.html" style="font-size:13px;color:var(--blue);font-weight:500;">← 더치페이 앱으로 이동</a>
      </div>
    </div>`;
    return;
  }
  el.innerHTML=`<div class="record-list">${records.map(r=>{
    const sid=r.id.replace(/[^a-zA-Z0-9]/g,'');
    const dateStr=r.dateEnd&&r.dateEnd!==r.dateStart
      ?`${fmtDateShort(r.dateStart)} ~ ${fmtDateShort(r.dateEnd)}`
      :fmtDate(r.dateStart);
    const people=(r.people||[]).join(' · ');
    const txns=r.txns||[];
    const rcItems=r.items||[];

    // 품목 내역
    const itemsHtml=rcItems.length
      ?`<div class="rc-section-title">품목</div>`+rcItems.filter(it=>+it.amount!==0).map(it=>{
          const mems=(it.members&&it.members.length)?it.members.join(', '):(r.people||[]).join(', ');
          const isNegIt=+it.amount<0;
          return `<div class="rc-item-row">
            <div class="rc-item-info">
              <div class="rc-item-name">${e(it.name||'(이름 없음)')}</div>
              <div class="rc-item-meta">${e(it.payer||'')} 결제 · ${e(mems)}</div>
            </div>
            <span class="rc-item-amt${isNegIt?' neg':''}">${fmt(+it.amount)}원</span>
          </div>`;
        }).join('')
      :'';

    // 송금 내역
    const txnHtml=txns.length
      ?`<div class="rc-section-title">송금</div>`+`<div class="rc-txns">`+txns.map(t=>`<div class="rc-txn-row">
          <div class="rc-txn-people"><span>${e(t.from)}</span>${svgArrow}<span>${e(t.to)}</span></div>
          <span class="rc-txn-amt">${fmt(t.amt)}원</span>
        </div>`).join('')+`</div>`
      :`<div class="rc-no-txn">모두 정산 완료 ✓</div>`;

    const isNeg=r.total<0;
    return `<div class="record-card">
      <div class="rc-hd" onclick="toggleCard('${sid}')">
        <div class="rc-meta">
          <div class="rc-date">${e(dateStr)}</div>
          <div class="rc-name">${e(r.groupName)||'더치페이 정산'}</div>
          <div class="rc-people">${e(people)}</div>
        </div>
        <div class="rc-right">
          <div class="rc-total${isNeg?' neg':''}">${fmt(r.total)}원</div>
          <span class="rc-chevron" id="rcc_${sid}">▼</span>
        </div>
      </div>
      <div class="rc-body" id="rcb_${sid}">
        ${itemsHtml}
        ${txnHtml}
      </div>
      <div class="rc-foot">
        <span class="rc-saved-at">${fmtSavedAt(r.savedAt)} 저장 · ${(r.people||[]).length}명</span>
        <button class="rc-del-btn" onclick="deleteRecord('${e(r.id)}')">삭제</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── Dropbox PKCE OAuth ──
async function sha256b64url(str){
  const data=new TextEncoder().encode(str);
  const hash=await crypto.subtle.digest('SHA-256',data);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function randomStr(len){
  const arr=new Uint8Array(len);crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'').slice(0,len);
}

async function dbxConnect(){
  const appKey=(document.getElementById('dbxAppKey')?.value||'').trim();
  if(!appKey){toast('App Key를 입력해주세요',{type:'error'});return;}
  localStorage.setItem(DBX_APPKEY,appKey);
  const verifier=randomStr(64);
  const challenge=await sha256b64url(verifier);
  sessionStorage.setItem('dbx_verifier',verifier);
  const redirectUri=location.origin+location.pathname;
  const params=new URLSearchParams({
    client_id:appKey,redirect_uri:redirectUri,
    response_type:'code',code_challenge:challenge,
    code_challenge_method:'S256',token_access_type:'offline'
  });
  location.href=`https://www.dropbox.com/oauth2/authorize?${params}`;
}

async function dbxHandleCallback(){
  const params=new URLSearchParams(location.search);
  const code=params.get('code');
  if(!code)return;
  history.replaceState({},'',location.pathname);
  const verifier=sessionStorage.getItem('dbx_verifier');
  if(!verifier){toast('인증 오류: 다시 시도해주세요',{type:'error'});return;}
  sessionStorage.removeItem('dbx_verifier');
  const appKey=localStorage.getItem(DBX_APPKEY);
  const redirectUri=location.origin+location.pathname;
  try{
    const res=await fetch('https://api.dropboxapi.com/oauth2/token',{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({code,grant_type:'authorization_code',client_id:appKey,redirect_uri:redirectUri,code_verifier:verifier})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error_description||data.error);
    localStorage.setItem(DBX_TOKEN,data.access_token);
    if(data.refresh_token)localStorage.setItem(DBX_REFRESH,data.refresh_token);
    // 계정 정보 조회
    try{
      const acRes=await fetch('https://api.dropboxapi.com/2/users/get_current_account',{
        method:'POST',headers:{Authorization:`Bearer ${data.access_token}`}
      });
      const ac=await acRes.json();
      localStorage.setItem(DBX_ACCOUNT,JSON.stringify({name:ac.name?.display_name||'',email:ac.email||''}));
    }catch(e){}
    toast('Dropbox 연결됐어요!',{type:'success'});
    renderDbxSettings();updateDbxBadge();syncDropbox();
  }catch(err){
    toast('연결 실패: '+err.message,{type:'error'});
  }
}

async function dbxRefreshToken(){
  const refresh=localStorage.getItem(DBX_REFRESH);
  const appKey=localStorage.getItem(DBX_APPKEY);
  if(!refresh||!appKey)return null;
  try{
    const res=await fetch('https://api.dropboxapi.com/oauth2/token',{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({grant_type:'refresh_token',refresh_token:refresh,client_id:appKey})
    });
    const data=await res.json();
    if(data.access_token){localStorage.setItem(DBX_TOKEN,data.access_token);return data.access_token;}
    return null;
  }catch(e){return null;}
}

function dbxGetToken(){return localStorage.getItem(DBX_TOKEN);}

function dbxDisconnect(){
  if(!confirm('Dropbox 연결을 해제할까요?'))return;
  [DBX_TOKEN,DBX_REFRESH,DBX_ACCOUNT,DBX_LASTSYNC].forEach(k=>localStorage.removeItem(k));
  renderDbxSettings();updateDbxBadge();updateSyncInfo();
  toast('Dropbox 연결 해제됨');
}

async function dbxUpload(token,path,content){
  const res=await fetch('https://content.dropboxapi.com/2/files/upload',{
    method:'POST',
    headers:{
      'Authorization':`Bearer ${token}`,
      'Content-Type':'application/octet-stream',
      'Dropbox-API-Arg':JSON.stringify({path,mode:'overwrite',autorename:false,mute:true})
    },
    body:content
  });
  if(res.status===401){const t=await dbxRefreshToken();if(t)return dbxUpload(t,path,content);throw new Error('인증 만료');}
  if(!res.ok)throw new Error(`Upload ${res.status}`);
  return res.json();
}

async function dbxDownload(token,path){
  const res=await fetch('https://content.dropboxapi.com/2/files/download',{
    method:'POST',
    headers:{
      'Authorization':`Bearer ${token}`,
      'Dropbox-API-Arg':JSON.stringify({path})
    }
  });
  if(res.status===409)return null; // 파일 없음
  if(res.status===401){const t=await dbxRefreshToken();if(t)return dbxDownload(t,path);return null;}
  if(!res.ok)return null;
  try{const text=await res.text();return JSON.parse(text);}catch(e){return null;}
}

let _syncing=false;
async function syncDropbox(uploadOnly=false){
  const token=dbxGetToken();if(!token)return;
  if(_syncing)return;_syncing=true;
  updateDbxBadge('syncing');
  try{
    const local=loadHistory();
    if(!uploadOnly){
      const remote=await dbxDownload(token,DBX_FILE);
      if(remote&&Array.isArray(remote)){
        const map=new Map();
        [...remote,...local].forEach(r=>{
          // 같은 id면 savedAt 최신 우선
          const ex=map.get(r.id);
          if(!ex||(r.savedAt||'')>(ex.savedAt||''))map.set(r.id,r);
        });
        const merged=Array.from(map.values()).sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
        saveHistory(merged);render();
      }
    }
    // 업로드
    const toUpload=loadHistory();
    await dbxUpload(token,DBX_FILE,JSON.stringify(toUpload,null,2));
    localStorage.setItem(DBX_LASTSYNC,new Date().toISOString());
    updateDbxBadge('connected');updateSyncInfo();
  }catch(err){
    toast('동기화 실패: '+err.message,{type:'error'});
    updateDbxBadge(dbxGetToken()?'connected':'');
  }finally{_syncing=false;}
}

function updateDbxBadge(state){
  const badge=document.getElementById('dbxBadge');if(!badge)return;
  badge.className='badge';
  if(!state)state=dbxGetToken()?'connected':'';
  if(state==='connected'){badge.classList.add('connected');badge.textContent='Dropbox 연결됨';}
  else if(state==='syncing'){badge.classList.add('syncing');badge.textContent='동기화 중...';}
  else{badge.textContent='Dropbox 미연결';}
}

function updateSyncInfo(){
  const el=document.getElementById('syncInfo');if(!el)return;
  const last=localStorage.getItem(DBX_LASTSYNC);
  if(!last){el.textContent='';return;}
  try{const d=new Date(last);el.textContent=`마지막 동기화 ${d.toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;}catch(e){}
}

// ── 패널 UI ──
let panelVisible=false;
let panelBodyVisible=true;

function togglePanel(){
  panelVisible=!panelVisible;
  const panel=document.getElementById('dbxPanel');
  panel.style.display=panelVisible?'block':'none';
  if(panelVisible)renderDbxSettings();
}

function togglePanelBody(){
  panelBodyVisible=!panelBodyVisible;
  document.getElementById('dbxPanelBody').style.display=panelBodyVisible?'block':'none';
  const ch=document.getElementById('dbxChevron');
  ch.className='dbx-chevron'+(panelBodyVisible?' open':'');
}

function renderDbxSettings(){
  const content=document.getElementById('dbxContent');if(!content)return;
  const token=dbxGetToken();
  const appKey=localStorage.getItem(DBX_APPKEY)||'';
  if(token){
    let acHtml='';
    try{const ac=JSON.parse(localStorage.getItem(DBX_ACCOUNT)||'{}');if(ac.name){acHtml=`<div class="dbx-account"><svg width="20" height="20" viewBox="0 0 40 40" fill="#1DAD53"><path d="M20 7.5L10 13.75 20 20 10 26.25 20 32.5 30 26.25 20 20 30 13.75 20 7.5zM10 26.25L0 20l10-6.25L0 7.5 10 1.25 20 7.5 10 13.75 20 20 10 26.25zM30 26.25L20 20l10-6.25L20 7.5l10 6.25L40 7.5 30 13.75 40 20 30 26.25 40 32.5 30 38.75 20 32.5z"/></svg><div class="dbx-account-info"><div class="dbx-account-name">${e(ac.name)}</div><div class="dbx-account-email">${e(ac.email)}</div></div><button class="dbx-disconnect" onclick="dbxDisconnect()">연결 해제</button></div>`;}}catch(e){}
    content.innerHTML=acHtml+
      `<div class="dbx-btn-row" style="margin-bottom:0">
        <button class="dbx-btn secondary" onclick="syncDropbox()">지금 동기화</button>
      </div>
      <div style="font-size:11px;color:var(--label3);margin-top:10px;text-align:center">Dropbox: <code style="font-size:10px;background:var(--fill);padding:1px 4px;border-radius:3px">dutch-pay_history.json</code></div>`;
  }else{
    content.innerHTML=
      `<div class="dbx-field">
        <div class="dbx-label">Dropbox App Key</div>
        <input class="dbx-inp" id="dbxAppKey" placeholder="앱 키 입력" value="${e(appKey)}"/>
        <div class="dbx-guide">
          1. <a href="https://www.dropbox.com/developers/apps" target="_blank">Dropbox 개발자 콘솔</a>에서 앱 생성<br>
          2. Permission: <strong>files.content.write</strong>, <strong>files.content.read</strong> 체크<br>
          3. Redirect URI 추가: <code>${location.origin+location.pathname}</code><br>
          4. App Key 복사 후 위에 입력
        </div>
      </div>
      <button class="dbx-btn" onclick="dbxConnect()">Dropbox 연결하기</button>`;
  }
}

// ── Toast ──
function toast(msg,opts={}){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast'+(opts.type?' '+opts.type:'');
  t.textContent=msg;
  wrap.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),250);},opts.duration||2500);
}

// ── Init ──
(async()=>{
  await dbxHandleCallback();
  updateDbxBadge();
  updateSyncInfo();
  render();
  if(dbxGetToken())syncDropbox();
})();
</script>
