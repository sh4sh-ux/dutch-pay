
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>더치페이</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-title" content="더치페이"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F7F8;--card:#fff;--left-bg:#FAFAFA;
  --label:#111;--label2:#666;--label3:#B0B0B8;
  --sep:#EBEBED;--sep2:#D4D4D8;--fill:#F3F3F5;--fill2:#F8F8FA;
  --blue:#4355E8;--blue-bg:#EEEFFE;--blue-txt:#2636B8;
  --green:#1DAD53;--green-bg:#EDFAF3;--green-txt:#13823D;
  --red:#E53E3E;--red-bg:#FFF0F0;
  --r:16px;--rm:10px;--rs:9px;--pad-x:32px;
}
html,body{background:var(--bg);font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;font-size:14px;color:var(--label);min-height:100vh;}
input,select,button{font-family:inherit;}
input[type="date"]{-webkit-appearance:none;-moz-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>");background-repeat:no-repeat;background-position:right 8px center;background-size:14px 14px;padding-right:28px !important;cursor:pointer;position:relative;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:0;position:absolute;right:0;top:0;width:34px;height:100%;cursor:pointer;margin:0;padding:0;}
input[type="date"]::-webkit-inner-spin-button,input[type="date"]::-webkit-clear-button{display:none;-webkit-appearance:none;}
button{cursor:pointer;}
svg{display:block;flex-shrink:0;}

.desktop-shell{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:48px 32px 80px;}
.desktop-app{display:grid;grid-template-columns:380px minmax(0,1fr);min-height:660px;width:100%;max-width:1100px;background:var(--card);border-radius:var(--r);border:1px solid var(--sep);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);}
.mobile-shell{display:none;}

@media(max-width:700px){
  .desktop-shell{display:none;}
  .mobile-shell{display:block;background:var(--bg);min-height:100vh;}
  .mob-header{background:var(--card);padding:max(20px,calc(env(safe-area-inset-top,0px) + 12px)) 20px 4px;border-bottom:1px solid var(--sep);}
  .mob-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .mob-title{font-size:22px;font-weight:700;letter-spacing:-.4px;}
  .mob-tabs{display:flex;gap:0;}
  .mob-tab{flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--label2);padding:10px 0 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
  .mob-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
  .mob-body{padding:16px 16px calc(max(env(safe-area-inset-bottom,0px),0px) + 72px);}
  .mob-owner-tap{display:none;}
  .mob-ver-badge{font-size:11px;font-weight:500;color:var(--label3);cursor:pointer;font-family:inherit;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;display:inline-flex;align-items:center;flex-shrink:0;padding:4px 2px;background:none;border:none;outline:none;-webkit-appearance:none;appearance:none;}
  .mob-section{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
  .mob-section-hd{padding:14px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between;}
  .mob-section-title{font-size:12px;font-weight:600;color:var(--label2);}
  .mob-clear-btn{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;}
  .mob-pin-wrap{padding:12px 16px;}
  .mob-pin-row{display:flex;gap:8px;margin-bottom:8px;}
  .mob-pin-row input{flex:1;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;min-width:0;}
  .mob-pin-row input:focus{border-color:var(--blue);}
  .mob-add-btn{border:none;background:var(--label);color:#fff;border-radius:var(--rs);padding:9px 16px;font-size:14px;font-weight:600;}
  .mob-hint{font-size:11px;color:var(--label3);margin-bottom:10px;}
  .mob-pills{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 14px;}
  .mob-empty-pills{padding:0 16px 14px;font-size:13px;color:var(--label3);}
  .mob-item-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer;animation:rowIn .25s ease;}
  .mob-item-row:last-child{border-bottom:none;}
  .mob-item-row.sel{background:var(--fill2);}
  .mob-item-dot{width:6px;height:6px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
  .mob-item-row.sel .mob-item-dot{background:var(--blue);}
  .mob-item-info{flex:1;min-width:0;}
  .mob-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mob-item-meta{font-size:11px;color:var(--label3);margin-top:2px;}
  .mob-item-amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;}
  .mob-add-item-row{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;}
  .mob-add-ic{width:24px;height:24px;border-radius:50%;background:var(--blue-bg);color:var(--blue-txt);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;}
  .mob-add-txt{font-size:14px;font-weight:500;color:var(--blue);}
  .mob-total-bar{background:var(--card);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .mob-total-lbl{font-size:13px;color:var(--label2);}
  .mob-total-val{font-size:20px;font-weight:700;}
  .mob-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;}
  .mob-sheet-overlay.open{display:block;}
  .mob-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:0 0 40px;max-height:85vh;overflow-y:auto;z-index:101;transform:translateY(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1);}
  .mob-sheet.open{transform:translateY(0);}
  .mob-sheet-handle{width:36px;height:4px;background:var(--sep2);border-radius:2px;margin:12px auto 16px;}
  .mob-sheet-title{font-size:16px;font-weight:700;padding:0 20px 16px;border-bottom:1px solid var(--sep);}
  .mob-sheet-body{padding:20px 20px 0;}
  .stat-val{font-size:17px;}
  .stat-box{padding:14px 10px;}
}

.left{border-right:1px solid var(--sep);display:flex;flex-direction:column;background:var(--left-bg);}
.left-top{padding:28px var(--pad-x) 0;}
.app-label{font-size:11px;font-weight:600;color:var(--label3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.app-version{font-weight:300;letter-spacing:0;opacity:.7;text-transform:none;margin-left:4px;}
.app-title{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.15;margin-bottom:18px;}
.tab-row{display:flex;gap:2px;background:var(--fill);border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--label2);padding:6px 0;border-radius:8px;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--card);color:var(--label);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.people-wrap{padding:0 0 14px;border-bottom:1px solid var(--sep);}
.sec-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-label{font-size:12px;font-weight:600;color:var(--label2);}
.clear-all-btn{font-size:11px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;cursor:pointer;}
.pin-row{display:flex;gap:6px;margin-bottom:6px;}
.pin-row input{flex:1;border:1px solid var(--sep2);border-radius:var(--rs);padding:7px 10px;font-size:13px;background:var(--card);color:var(--label);outline:none;min-width:0;}
.pin-row input:focus{border-color:var(--blue);}
.pin-btn{border:none;background:var(--label);color:#fff;border-radius:var(--rs);padding:7px 13px;font-size:13px;font-weight:600;}
.pin-hint{font-size:11px;color:var(--label3);margin-bottom:8px;}
.pills{display:flex;flex-wrap:wrap;gap:5px;min-height:20px;}
.pills-empty{font-size:12px;color:var(--label3);}
.amt-neg{color:var(--red);}
.toast-container{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:calc(100% - 32px);max-width:420px;}
.toast{background:var(--label);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:auto;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(20px);transition:opacity .25s,transform .25s;max-width:100%;line-height:1.4;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-msg{flex:1;}
.toast-action{background:transparent;color:#5BB0FF;border:none;font-size:14px;font-weight:700;cursor:pointer;padding:0 4px;font-family:inherit;white-space:nowrap;}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}
.pill{display:inline-flex;align-items:center;gap:3px;background:var(--fill);border:1px solid var(--sep);border-radius:20px;padding:4px 7px 4px 10px;font-size:12px;font-weight:500;white-space:nowrap;animation:pillIn .2s ease;cursor:pointer;user-select:none;}
@keyframes pillIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.pill-x{border:none;background:none;color:var(--label3);padding:0;display:flex;align-items:center;}
.items-scroll{flex:1;overflow-y:auto;padding:14px 0 0;}
.items-scroll::-webkit-scrollbar{width:3px;}
.items-scroll::-webkit-scrollbar-thumb{background:var(--sep2);border-radius:2px;}
.ilist-label-row{display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad-x);margin-bottom:8px;gap:6px;}
.ilist-label{font-size:12px;font-weight:600;color:var(--label2);flex-shrink:0;}
.ilist-tools{display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end;}
.ilist-search{flex:1;max-width:140px;min-width:0;font-size:12px;padding:4px 8px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label);outline:none;}
.ilist-search:focus{border-color:var(--blue);}
.ilist-sort{font-size:11px;padding:4px 6px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label2);font-family:inherit;cursor:pointer;}
.ilist-sort:focus{border-color:var(--blue);}
.ilist-results-empty{padding:24px var(--pad-x);font-size:13px;color:var(--label3);text-align:center;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px var(--pad-x);border-bottom:1px solid var(--sep);cursor:pointer;transition:background .12s;animation:rowIn .25s ease;}
@keyframes rowIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.item-row:hover,.item-row.sel{background:var(--fill);}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
.item-row.sel .item-dot{background:var(--blue);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--label3);margin-top:1px;}
.item-amt{font-size:13px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums;}
.add-row{display:flex;align-items:center;gap:10px;padding:11px var(--pad-x);cursor:pointer;transition:background .1s;}
.add-row:hover{background:var(--fill);}
.add-ic{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--blue-txt);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:400;line-height:1;flex-shrink:0;}
.add-txt{font-size:13px;font-weight:500;color:var(--blue);}
.left-foot{border-top:1px solid var(--sep);padding:14px var(--pad-x);}
.foot-row{display:flex;align-items:baseline;justify-content:space-between;}
.foot-lbl{font-size:12px;color:var(--label2);}
.foot-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}

.right{display:flex;flex-direction:column;background:var(--card);}
.right-top{padding:28px 32px 20px;border-bottom:1px solid var(--sep);}
.r-eye{font-size:12px;font-weight:600;color:var(--label3);margin-bottom:6px;}
.r-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.r-sub{font-size:13px;color:var(--label2);line-height:1.55;}
.right-body{flex:1;padding:24px 32px;overflow-y:auto;}
.right-body::-webkit-scrollbar{width:3px;}
.right-body::-webkit-scrollbar-thumb{background:var(--sep2);border-radius:2px;}

.field-g{margin-bottom:18px;}
.field-lbl{font-size:12px;font-weight:600;color:var(--label2);margin-bottom:6px;}
.field-inp{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;}
.field-inp:focus{border-color:var(--blue);}
.field-sel{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;appearance:none;cursor:pointer;}
.amt-wrap{position:relative;}
.amt-wrap input{padding-left:44px;padding-right:30px;}
.amt-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--label3);pointer-events:none;}
.amt-sign-btn{position:absolute;left:4px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:1px solid var(--sep2);border-radius:50%;background:var(--card);color:var(--label3);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:all .12s;}
.amt-sign-btn:hover{border-color:var(--label3);}
.amt-sign-btn.on{background:var(--red);color:#fff;border-color:var(--red);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{border:1px solid var(--sep2);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;background:var(--card);color:var(--label2);transition:all .12s;}
.chip.on{border-color:var(--label);background:var(--label);color:#fff;}
.chip.watch{background:#F0EFF8;border-color:#C8C6E0;color:#7070A8;}
.chip-watch-lbl{font-size:10px;font-weight:700;margin-left:2px;}
.treat-toggle{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:10px 14px;font-size:14px;font-family:inherit;background:var(--card);color:var(--label2);cursor:pointer;text-align:left;transition:all .12s;}
.treat-toggle.on{border-color:#D47000;background:#FFF8EE;color:#D47000;font-weight:600;}
.treat-badge{font-size:11px;color:#4355E8;font-weight:600;flex-shrink:0;}
.del-btn{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:10px;font-size:13px;color:var(--red);background:transparent;margin-top:8px;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.del-btn:hover{background:var(--red-bg);}
.confirm-btn{width:100%;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;background:var(--label);color:#fff;margin-top:16px;cursor:pointer;transition:opacity .12s;}
.confirm-btn:hover{opacity:.85;}

.stat-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.result-amt-hero{font-size:36px;font-weight:700;letter-spacing:-.8px;color:var(--blue);font-variant-numeric:tabular-nums;line-height:1.1;padding:6px 2px 20px;}
.stat-box{background:var(--fill);border-radius:var(--rm);padding:16px 12px;text-align:center;min-width:0;}
.stat-lbl{font-size:11px;color:var(--label2);font-weight:500;margin-bottom:6px;white-space:nowrap;}
.stat-val{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums;}
.pcard{border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 10px rgba(20,25,40,.08);}
.phd{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--fill2);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue-txt);flex-shrink:0;}
.pname-col{flex:1;}
.pname{font-size:14px;font-weight:600;}
.pnet{font-size:11px;margin-top:2px;}
.pnet.pos{color:var(--green);}
.pnet.neg{color:var(--red);}
.pnet.zero{color:var(--label3);}
.ptotal{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;}
.bd-row{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--sep);gap:8px;}
.bd-row:last-child{border-bottom:none;}
.bd-name{font-size:13px;flex:1;color:var(--label2);display:flex;align-items:center;gap:6px;min-width:0;}
.bd-name-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bd-ptag{font-size:11px;color:var(--label3);white-space:nowrap;}
.bd-share{font-size:13px;font-weight:600;}
.bd-ex-tag{font-size:10px;color:var(--blue-txt);background:var(--blue-bg);border-radius:4px;padding:1px 5px;font-weight:500;flex-shrink:0;}

.right-body.settle-mode{background:var(--bg);}
.settle-hero{background:var(--card);border-radius:var(--r);padding:22px 20px;margin-bottom:14px;text-align:center;box-shadow:0 2px 12px rgba(20,25,40,.07);}
.sh-num{font-size:34px;font-weight:700;letter-spacing:-.5px;margin-bottom:0;font-variant-numeric:tabular-nums;}
.sh-divider{height:1px;background:var(--sep);margin:14px 0;}
.sh-sub{font-size:12px;color:var(--label2);}
.txn-card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:8px;box-shadow:0 2px 10px rgba(20,25,40,.07);}
.txn-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:12px;}
.txn-row:last-child{border-bottom:none;}
.txn-row.expandable{cursor:pointer;transition:background .1s;}
.txn-row.expandable:hover{background:var(--fill);}
.txn-row.pm-done{background:linear-gradient(90deg,rgba(52,199,89,.07) 0%,var(--card) 70%);}
.txn-row.pm-diff{background:linear-gradient(90deg,rgba(255,59,48,.06) 0%,var(--card) 70%);}
.txn-status-ic{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--sep2);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.txn-status-ic.done{background:var(--green);border-color:var(--green);}
.txn-status-ic.diff{background:var(--red);border-color:var(--red);}
.txn-right{text-align:right;flex-shrink:0;}
.txn-chev{color:var(--label3);font-size:11px;flex-shrink:0;margin-left:2px;transition:transform .2s;}
.txn-chev.open{transform:rotate(180deg);}
.txn-pmeta{font-size:11px;color:var(--label3);margin-top:1px;}
.txn-sdiff{font-size:11px;font-weight:500;margin-top:1px;}
.txn-sdiff.pos{color:var(--green);}
.txn-sdiff.neg{color:var(--red);}
.txn-amt.done-clr{color:var(--green);}
.txn-amt.neg-clr{color:var(--red);}
.txn-item{border-bottom:1px solid var(--sep);}
.txn-item:last-child{border-bottom:none;}
.pm-card .txn-row{border-bottom:none;}
.pay-panel{background:var(--fill);border-top:1px solid var(--sep);padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.pay-panel-row{display:flex;align-items:center;gap:8px;}
.pay-panel-lbl{font-size:12px;font-weight:500;color:var(--label3);width:52px;flex-shrink:0;}
.pay-toggle-track{width:40px;height:24px;border-radius:12px;background:var(--sep2);flex-shrink:0;position:relative;cursor:pointer;transition:background .2s;}
.pay-toggle-track.on{background:var(--green);}

.empty{text-align:center;padding:64px 20px;color:var(--label3);}
.empty-icon{margin-bottom:12px;display:flex;justify-content:center;color:var(--label3);}
.empty p{font-size:14px;line-height:1.7;}
.empty-sm{text-align:center;padding:24px 16px;color:var(--label3);font-size:13px;line-height:1.6;}

/* ── 기록 보관함 ── */
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
.hist-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--label3);padding:5px 10px;border:1px solid var(--sep);background:var(--fill2);border-radius:20px;white-space:nowrap;}
.hist-badge.connected{color:var(--green-txt);border-color:var(--green);background:var(--green-bg);}
.hist-badge.syncing{color:var(--blue-txt);border-color:var(--blue);background:var(--blue-bg);}
.hist-dbx-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--label2);padding:5px 10px;border:1px solid var(--sep);background:var(--fill2);border-radius:20px;cursor:pointer;white-space:nowrap;}
.hist-dbx-btn:hover{background:var(--fill);color:var(--label);}
.record-list{display:flex;flex-direction:column;gap:10px;}
.record-card{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;}
.rc-hd{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;transition:background .12s;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;}
.rc-hd:hover{background:var(--fill2);}
.rc-meta{flex:1;min-width:0;}
.rc-date{font-size:11px;color:var(--label3);margin-bottom:3px;}
.rc-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.rc-people{font-size:12px;color:var(--label2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.rc-total{font-size:18px;font-weight:700;white-space:nowrap;}
.rc-total.neg{color:var(--red);}
.rc-chevron{font-size:11px;color:var(--label3);transition:transform .2s;}
.rc-chevron.open{transform:rotate(180deg);}
.rc-body{border-top:1px solid var(--sep);display:none;}
.rc-body.open{display:block;}
.rc-section-title{font-size:12px;font-weight:600;color:var(--label2);padding:10px 16px 6px;}
.rc-item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--sep);gap:10px;}
.rc-item-row:last-child{border-bottom:none;}
.rc-item-info{flex:1;min-width:0;}
.rc-item-name-row{display:flex;align-items:center;gap:5px;padding-left:8px;min-width:0;}
.rc-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1;}
.rc-item-meta{font-size:11px;color:var(--label3);margin-top:2px;padding-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-payer-pill{white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:var(--fill);color:var(--label2);border-radius:100px;padding:2px 8px;font-size:10px;line-height:1;}
.rc-item-amt{font-size:13px;font-weight:600;flex-shrink:0;}
.rc-item-amt.neg{color:var(--red);}
.rc-txns{padding:0 0 4px;}
.rc-txn-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--sep);font-size:13px;}
.rc-txn-row:last-child{border-bottom:none;}
.rc-txn-people{display:flex;align-items:center;gap:14px;color:var(--label);}
.rc-txn-amt{font-weight:600;flex-shrink:0;}
.rc-no-txn{font-size:13px;color:var(--green);padding:10px 16px;text-align:center;}
.rc-foot{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;background:var(--fill2);border-top:1px solid var(--sep);}
.rc-saved-at{font-size:11px;color:var(--label3);}
.rc-del-btn{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;cursor:pointer;}
.rc-del-btn:hover{opacity:.7;}
.rc-load-btn{font-size:12px;color:var(--blue);border:none;background:transparent;font-weight:500;padding:0;cursor:pointer;}
.rc-load-btn:hover{opacity:.7;}
.rc-pdf-btn{font-size:12px;color:var(--label2);border:none;background:transparent;font-weight:500;padding:0;cursor:pointer;}
.rc-pdf-btn:hover{opacity:.7;}
.hist-search-wrap{padding:10px 0 4px;}
.hist-search{width:100%;font-size:13px;padding:8px 12px;border:1px solid var(--sep2);border-radius:10px;background:var(--card);color:var(--label);outline:none;font-family:inherit;box-sizing:border-box;}
.hist-search:focus{border-color:var(--blue);}
.sync-info{font-size:12px;color:var(--label3);text-align:center;margin-top:14px;padding-bottom:4px;}
/* Dropbox panel */
.dbx-panel{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.dbx-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.dbx-panel-hd:hover{background:var(--fill2);}
.dbx-panel-title{font-size:13px;font-weight:600;color:var(--label);}
.dbx-panel-sub{font-size:12px;color:var(--label3);margin-top:1px;}
.dbx-chevron{color:var(--label3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.dbx-chevron.open{transform:rotate(180deg);}
.dbx-panel-body{padding:16px;border-top:1px solid var(--sep);}
.dbx-field{margin-bottom:14px;}
.dbx-label{font-size:12px;font-weight:600;color:var(--label2);margin-bottom:6px;}
.dbx-inp{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;font-family:inherit;}
.dbx-inp:focus{border-color:var(--blue);}
.dbx-guide{font-size:12px;color:var(--label3);line-height:1.65;margin-top:6px;}
.dbx-guide code{font-size:11px;background:var(--fill);padding:2px 5px;border-radius:4px;font-family:monospace;word-break:break-all;}
.dbx-btn{width:100%;border:none;border-radius:var(--rs);padding:11px;font-size:14px;font-weight:600;background:var(--label);color:#fff;cursor:pointer;transition:opacity .12s;font-family:inherit;}
.dbx-btn:hover{opacity:.88;}
.dbx-btn.secondary{background:var(--fill);color:var(--label);border:1px solid var(--sep2);}
.dbx-btn.secondary:hover{background:var(--fill2);}
.dbx-account{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--green-bg);border:1px solid var(--green);border-radius:var(--rs);margin-bottom:12px;}
.dbx-account-info{flex:1;min-width:0;}
.dbx-account-name{font-size:13px;font-weight:600;color:var(--green-txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-account-email{font-size:11px;color:var(--green-txt);opacity:.8;}
.dbx-disconnect{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;flex-shrink:0;cursor:pointer;font-family:inherit;}
.dbx-btn-row{display:flex;gap:8px;}
.dbx-btn-row .dbx-btn{flex:1;padding:9px;}
/* ── 기록 보관함 드로어 ── */
.hist-dr-ov{position:fixed;inset:0;background:rgba(0,0,0,.38);opacity:0;transition:opacity .3s ease;pointer-events:none;z-index:300;-webkit-backdrop-filter:blur(1px);backdrop-filter:blur(1px);}
.hist-dr-ov.open{opacity:1;pointer-events:auto;cursor:pointer;}
.hist-dr{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 32px rgba(0,0,0,.12),0 -1px 4px rgba(0,0,0,.05);z-index:301;display:flex;flex-direction:column;height:84dvh;transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1);will-change:transform;}
.hist-dr.open{transform:translateY(0);}
.hist-dr-handle{display:flex;justify-content:center;padding:10px 0 0;flex-shrink:0;}
.hist-dr-handle-bar{width:36px;height:4px;background:var(--sep2);border-radius:2px;}
.hist-dr-hd{display:flex;align-items:center;padding:10px 16px 0;flex-shrink:0;gap:8px;}
.hist-dr-title{font-size:17px;font-weight:700;color:var(--label);flex:1;}
.hist-dr-cnt{font-size:13px;font-weight:500;color:var(--label3);}
.hist-dr-close{width:28px;height:28px;border-radius:50%;background:var(--fill);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--label2);font-size:12px;font-weight:700;font-family:inherit;transition:background .12s;flex-shrink:0;}
.hist-dr-close:hover{background:var(--sep2);}
.hist-dr-sort{display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.hist-dr-sort::-webkit-scrollbar{display:none;}
.hist-dr-pill{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1.5px solid var(--sep2);background:transparent;font-size:12px;font-weight:500;color:var(--label2);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.hist-dr-pill.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-txt);font-weight:600;}
.hist-dr-sinp-wrap{padding:8px 16px 0;flex-shrink:0;}
.hist-dr-sinp{width:100%;background:var(--fill);border:none;border-radius:10px;padding:9px 12px 9px 34px;font-size:14px;color:var(--label);font-family:inherit;outline:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238E8E93' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:10px center;}
.hist-dr-sinp::placeholder{color:var(--label3);}
.hist-dr-sinp:focus{box-shadow:0 0 0 2px var(--blue);border-radius:10px;}
.hist-dr-body{overflow-y:auto;flex:1;padding:10px 16px 40px;-webkit-overflow-scrolling:touch;}
.sinp-rel{position:relative;display:flex;align-items:center;width:100%;}
.sinp-rel > input{padding-right:26px;}
.sinp-clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--label3);font-size:14px;line-height:1;cursor:pointer;padding:2px 4px;display:none;-webkit-appearance:none;appearance:none;touch-action:manipulation;}
.sinp-clr.vis{display:flex;align-items:center;justify-content:center;}
.ilist-s-wrap{flex:1;max-width:140px;min-width:0;}
.ilist-s-wrap .ilist-search{width:100%;max-width:none;flex:1;}
/* ── 날짜 표시 (로케일 독립적 YYYY.MM.DD) ── */
.dp-wrap{position:relative;width:100%;display:block;}
.dp-txt{border:1px solid var(--sep2);border-radius:var(--rs);padding:8px 28px 8px 10px;font-size:13px;background-color:var(--card);color:var(--label);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>");background-repeat:no-repeat;background-position:right 8px center;background-size:14px 14px;cursor:pointer;white-space:nowrap;width:100%;box-sizing:border-box;line-height:1.4;}
.dp-wrap.share-date-inp{flex:1;}
.dp-wrap.pay-date-wrap{width:auto;flex:1;}
.dp-ph{color:var(--label3);}
.dp-inp{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;font-size:16px;}
/* ── 모바일 FAB ── */
.mob-fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;border:none;border-radius:28px;padding:14px 28px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(67,85,232,.35);z-index:50;white-space:nowrap;display:none;transition:opacity .15s;}
.mob-fab:active{opacity:.85;}
/* ── 동기화 충돌 모달 ── */
.sc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.sc-modal{background:var(--card);border-radius:20px;padding:24px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.sc-hd{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--label);}
.sc-desc{font-size:13px;color:var(--label3);margin-bottom:20px;line-height:1.5;}
.sc-card{border:1px solid var(--sep);border-radius:14px;padding:14px;margin-bottom:14px;}
.sc-card-title{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--label);}
.sc-versions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sc-ver{background:var(--fill);border:2px solid transparent;border-radius:10px;padding:10px;text-align:left;cursor:pointer;font-family:inherit;transition:border-color .15s,background .15s;width:100%;}
.sc-ver.on{border-color:var(--blue);background:var(--blue-bg);}
.sc-ver-hd{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--label2);}
.sc-ver-sub{font-size:11px;color:var(--label3);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-ver-row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--label);margin-bottom:2px;}
.sc-ver-at{font-size:10px;color:var(--label3);}
.sc-confirm{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.sc-confirm:active{opacity:.88;}
</style>
</head>
<body>

<!-- DESKTOP -->
<div class="desktop-shell">
<div class="desktop-app">
  <div class="left" id="dLeft">
    <div class="left-top">
      <div class="app-label" id="dOwnerLabel" onclick="_ownerAreaClick(this,event)" style="user-select:none;-webkit-tap-highlight-color:transparent;cursor:default">Dutch Pay</div>
      <div class="app-title" onclick="dSetTab('input')" style="cursor:pointer">더치페이</div>
      <div style="margin-bottom:16px"></div>
      <div class="tab-row">
        <button class="tab on" id="dTInput" onclick="dSetTab('input')">입력</button>
        <button class="tab" id="dTResult" onclick="dSetTab('result')">정산</button>
        <button class="tab" id="dTSettle" onclick="dSetTab('settle')">공유</button>
        <button class="tab" id="dTHistory" onclick="dSetTab('history')" style="display:none">기록</button>
        <button class="tab" id="dTPayment" onclick="dSetTab('payment')" style="display:none">수금</button>
      </div>
      <div style="margin-bottom:14px;">
        <div class="dp-wrap" onclick="_dpPick(this)"><div class="dp-txt" id="meetingDateDisp"></div><input type="date" id="meetingDateInp" class="dp-inp" onclick="event.stopPropagation();try{this.showPicker();}catch(e){this.focus();}" onchange="updateMeetingDate(this.value);_dpSync(this)"/></div>
      </div>
      <div class="people-wrap">
        <div class="sec-label-row">
          <span class="sec-label">참여자</span>
        </div>
        <div class="pin-row">
          <input id="dPInp" aria-label="참여자 이름" placeholder="홍길동, 홍길순, 아무개"/>
          <button class="pin-btn" onclick="dFlush()">추가</button>
        </div>
        <div class="pin-hint">쉼표(,)로 구분하면 여러 명을 한 번에 추가할 수 있어요</div>
        <div class="pills" id="dPills"><span class="pills-empty">이름을 입력하세요</span></div>
      </div>
    </div>
    <div class="items-scroll">
      <div class="ilist-label-row">
        <span class="ilist-label">지출</span>
      </div>
      <div class="ilist-label-row" id="dItemTools" style="display:none">
        <div class="sinp-rel ilist-s-wrap">
          <input type="search" class="ilist-search" id="dItemSearch" placeholder="검색" oninput="setItemSearch(this.value);_chkClear(this)"/>
          <button class="sinp-clr" aria-label="검색어 지우기" onclick="_clrItemSearch()">✕</button>
        </div>
        <select class="ilist-sort" onchange="setItemSort(this.value)" id="dItemSort">
          <option value="default">기본순</option>
        </select>
      </div>
      <div id="dItemRows"></div>
      <div class="add-row" onclick="addItem()">
        <div class="add-ic">+</div>
        <span class="add-txt">지출 추가</span>
      </div>
    </div>
    <div class="left-foot">
      <div class="foot-row">
        <span class="foot-lbl">합계</span>
        <span class="foot-val" id="dTotal">0원</span>
      </div>
      <button class="reset-settle-btn" onclick="resetCurrentSettlement()">↺ 이번 정산 초기화</button>
      <div id="dbxSyncBadge" style="font-size:11px;color:var(--label3);text-align:right;margin-top:5px;min-height:14px"></div>
      <div style="font-size:10px;color:var(--label3);text-align:right;margin-top:4px;letter-spacing:.3px"><span id="appVersionD"></span></div>
    </div>
  </div>
  <div class="right">
    <div class="right-top">
      <div class="r-eye" id="dREye">시작하기</div>
      <div class="r-title" id="dRTitle">참여자와 지출을 추가해보세요</div>
      <div class="r-sub" id="dRSub">왼쪽에서 참여자를 입력하고 지출을 추가하면 정산을 시작할 수 있어요.</div>
    </div>
    <div class="right-body" id="dRBody">
      <div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="11" y2="16"/></svg></div><p>지출을 선택하거나 추가하면<br>여기서 편집할 수 있어요</p></div>
    </div>
  </div>
</div>
</div>

<!-- MOBILE -->
<div class="mobile-shell">
  <div class="mob-header">
    <div class="mob-title-row">
      <div style="display:flex;align-items:center;gap:7px;min-width:0;">
        <span class="mob-title" onclick="mSetTab('input')" style="cursor:pointer">더치페이</span>
        <button class="mob-ver-badge" id="appVersionM"></button>
      </div>
      <span id="mTotal" style="font-size:18px;font-weight:700;flex-shrink:0;">0원</span>
    </div>
    <div style="margin-bottom:14px"></div>
    <div class="mob-tabs">
      <button class="mob-tab on" id="mTInput" onclick="mSetTab('input')">입력</button>
      <button class="mob-tab" id="mTResult" onclick="mSetTab('result')">정산</button>
      <button class="mob-tab" id="mTSettle" onclick="mSetTab('settle')">공유</button>
      <button class="mob-tab" id="mTHistory" onclick="mSetTab('history')" style="display:none">기록</button>
      <button class="mob-tab" id="mTPayment" onclick="mSetTab('payment')" style="display:none">수금</button>
    </div>
  </div>
  <div class="mob-body" id="mBody"></div>
  <div class="mob-owner-tap" id="mobOwnerTap" onclick="_ownerAreaClick(this,event)">DUTCH PAY <span class="app-version" id="appVersionMob"></span></div>
  <button class="mob-fab" id="mobFab" onclick="_mobFabClick()"></button>
  <div class="mob-sheet-overlay" id="mOverlay" onclick="closeSheet()"></div>
  <div class="mob-sheet" id="mSheet">
    <div class="mob-sheet-handle"></div>
    <div class="mob-sheet-title" id="mSheetTitle">지출 편집</div>
    <div class="mob-sheet-body" id="mSheetBody"></div>
  </div>
</div>

<!-- 기록 보관함 드로어 -->
<div class="hist-dr-ov" id="histDrOv" onclick="closeHistDrawer()"></div>
<div class="hist-dr" id="histDr">
  <div class="hist-dr-handle"><div class="hist-dr-handle-bar"></div></div>
  <div class="hist-dr-hd">
    <div class="hist-dr-title">기록 보관함</div>
    <span class="hist-dr-cnt" id="histDrCnt"></span>
    <button class="hist-dr-close" aria-label="기록 보관함 닫기" onclick="closeHistDrawer()">✕</button>
  </div>

function duplicateGroup(id){const g=groups.find(g=>g.id===id);if(!g)return;syncCurrentToGroup();const newId=_newGroupId();const ng={id:newId,name:g.name+' (복사)',nameAuto:false,data:{people:(g.data.people||[]).slice(),items:[],idc:0,settleDateStart:new Date().toISOString().slice(0,10),settleDateEnd:null,itemSort:'default',itemSearch:''}};groups.push(ng);currentGroupId=newId;loadGroupData(ng);renderAll();toast(`'${ng.name}' 생성됨`,{type:'success'});}

function _groupSummary(g){const isCurrent=g.id===currentGroupId;const data=isCurrent?{people,items,settleDateStart,settleDateEnd}:g.data||{};const peopleArr=data.people||[];const itemsArr=data.items||[];const total=itemsArr.reduce((s,it)=>s+(+it.amount||0),0);let dateText='';if(data.settleDateStart){const fmtD=(iso)=>iso?iso.slice(5).replace('-','.'):'';if(data.settleDateEnd&&data.settleDateEnd!==data.settleDateStart){dateText=fmtD(data.settleDateStart)+'~'+fmtD(data.settleDateEnd);}else{dateText=data.settleDateStart.slice(2).replace(/-/g,'.');}}return{total,totalText:total?fmt(total)+'원':'—',peopleText:peopleArr.length?peopleArr.join(' · '):'참여자 없음',peopleCount:peopleArr.length,dateText};}

function _positionPopover(pop,anchorEl,rightAlign){const r=anchorEl.getBoundingClientRect();pop.style.top=(r.bottom+window.scrollY+6)+'px';const isMobile=window.innerWidth<700;if(isMobile){pop.style.left='12px';pop.style.right='12px';pop.style.width='auto';pop.style.maxWidth='none';}else{pop.style.right='auto';pop.style.width='auto';const pr=pop.getBoundingClientRect();let left=rightAlign?r.right-pr.width+window.scrollX:r.left+window.scrollX;if(left+pr.width>window.innerWidth-8)left=window.innerWidth-pr.width-8;pop.style.left=Math.max(8,left)+'px';}}

function _openGroupMorePop(anchorBtn,id,parentPop){document.querySelectorAll('.group-more-pop').forEach(el=>el.remove());const g=groups.find(x=>x.id===id);if(!g)return;const canDelete=groups.length>1;const menu=document.createElement('div');menu.className='group-more-pop';menu.innerHTML=`<button class="group-more-opt" data-mact="duplicate">${svgCopy}<span>복사</span></button><button class="group-more-opt" data-mact="rename">${svgPencil}<span>이름 변경</span></button>${canDelete?`<button class="group-more-opt danger" data-mact="delete">${svgTrash}<span>삭제</span></button>`:''}`;document.body.appendChild(menu);const r=anchorBtn.getBoundingClientRect();const mr=menu.getBoundingClientRect();let top=r.bottom+4;if(top+mr.height>window.innerHeight-8)top=r.top-mr.height-4;let left=r.right-mr.width;if(left<8)left=8;menu.style.top=top+'px';menu.style.left=left+'px';menu.addEventListener('click',(e2)=>{e2.stopPropagation();const b=e2.target.closest('[data-mact]');if(!b)return;const mact=b.dataset.mact;menu.remove();if(parentPop&&parentPop.remove)parentPop.remove();if(mact==='duplicate'){duplicateGroup(id);}else if(mact==='rename'){const newName=prompt('새 이름:',g.name);if(newName&&newName.trim())renameGroup(id,newName);}else if(mact==='delete'){if(confirm(`'${g.name}' 그룹을 삭제할까요?`))deleteGroup(id);}});setTimeout(()=>{const close=(ev)=>{if(!menu.contains(ev.target)){menu.remove();document.removeEventListener('click',close);document.removeEventListener('keydown',esc);}};const esc=(ev)=>{if(ev.key==='Escape'){menu.remove();document.removeEventListener('click',close);document.removeEventListener('keydown',esc);}};document.addEventListener('click',close);document.addEventListener('keydown',esc);},0);}

function exportData(){syncCurrentToGroup();const payload={version:2,exportedAt:new Date().toISOString(),groups,currentGroupId};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=`더치페이_백업_${new Date().toISOString().slice(0,10)}.json`;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);toast('백업 파일이 다운로드됐어요',{type:'success'});}

function exportCurrentGroupCsv(){const g=getCurrentGroup();if(!g){toast('내보낼 데이터가 없어요',{type:'error'});return;}syncCurrentToGroup();if(!items.length){toast('지출이 없는 그룹이에요',{type:'error'});return;}const BOM='﻿';const esc=(s)=>{s=String(s==null?'':s);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};const lines=[];lines.push(`그룹,${esc(g.name)}`);if(settleDateStart){if(settleDateEnd&&settleDateEnd!==settleDateStart){lines.push(`기간,${settleDateStart} ~ ${settleDateEnd}`);}else{lines.push(`일자,${settleDateStart}`);}}const total=items.reduce((s,it)=>s+(+it.amount||0),0);lines.push(`총 금액,${total}`);lines.push(`참여자,${esc(people.join(', '))}`);lines.push('');lines.push('# 지출 내역');lines.push('번호,지출 이름,금액,결제자,참여자');items.forEach((it,i)=>{const mems=(it.members.length?it.members:people).join(', ');lines.push([i+1,esc(it.name||'(이름 없음)'),+it.amount||0,esc(it.payer||''),esc(mems)].join(','));});lines.push('');const{paid,owes}=computeShares();const txns=calcTxns(paid,owes);if(txns.length){lines.push('# 송금 내역');lines.push('보내는 사람,받는 사람,금액');txns.forEach(t=>{lines.push([esc(t.from),esc(t.to),t.amt].join(','));});lines.push('');}lines.push('# 개인별 정산');lines.push('이름,결제 총액,분담 총액,순액');people.forEach(p=>{const paidP=paid[p]||0,owesP=owes[p]||0,net=paidP-owesP;lines.push([esc(p),paidP,owesP,net].join(','));});const csv=BOM+lines.join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const safeName=g.name.replace(/[\\\/:*?"<>|]/g,'_');a.download=`더치페이_${safeName}_${new Date().toISOString().slice(0,10)}.csv`;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);toast('엑셀(CSV) 파일이 다운로드됐어요',{type:'success'});}



function getDisplayItems(){let arr=items.slice();if(itemSearch.trim()){const q=itemSearch.trim().toLowerCase();arr=arr.filter(it=>(it.name||'').toLowerCase().includes(q));}if(itemSort==='amtDesc')arr.sort((a,b)=>(+b.amount||0)-(+a.amount||0));else if(itemSort==='amtAsc')arr.sort((a,b)=>(+a.amount||0)-(+b.amount||0));return arr;}

let _toastContainer=null;

function toast(msg,opts){opts=opts||{};const container=_getToastContainer();const t=document.createElement('div');t.className='toast'+(opts.type?' '+opts.type:'');const span=document.createElement('span');span.className='toast-msg';span.textContent=msg;t.appendChild(span);let timer=null;const dismiss=()=>{if(timer){clearTimeout(timer);timer=null;}t.classList.remove('show');setTimeout(()=>{if(t.parentNode)t.remove();},250);};if(opts.action&&opts.actionLabel){const btn=document.createElement('button');btn.type='button';btn.className='toast-action';btn.textContent=opts.actionLabel;btn.addEventListener('click',()=>{opts.action();dismiss();});t.appendChild(btn);}container.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));const duration=opts.duration||(opts.action?5000:2500);timer=setTimeout(dismiss,duration);return{dismiss};}

function detectInAppBrowser(){const ua=navigator.userAgent||'';if(/KAKAOTALK/i.test(ua))return{name:'카카오톡',scheme:'kakaotalk://web/openExternal?url='};if(/NAVER\(inapp/i.test(ua))return{name:'네이버',scheme:null};if(/Line\//i.test(ua))return{name:'Line',scheme:'line://nv/openExternalBrowser/?url='};if(/Instagram/i.test(ua))return{name:'Instagram',scheme:null};if(/FBAN|FBAV/i.test(ua))return{name:'Facebook',scheme:null};return null;}

const STORAGE_KEY='dutchpay_v1';

const AUTO_BACKUP_MAX=5;

function _autoBackup(reason){
  try{
    syncCurrentToGroup();
    const slots=_loadAutoBackups();
    slots.unshift({reason:reason||'',savedAt:new Date().toISOString(),version:3,groups:JSON.parse(JSON.stringify(groups)),currentGroupId});
    if(slots.length>AUTO_BACKUP_MAX)slots.length=AUTO_BACKUP_MAX;
    localStorage.setItem(AUTO_BACKUP_KEY,JSON.stringify(slots));
  }catch(e){}
}
function _loadAutoBackups(){
  try{const d=JSON.parse(localStorage.getItem(AUTO_BACKUP_KEY)||'[]');return Array.isArray(d)?d:[];}catch(e){return [];}
}
function _restoreAutoBackup(idx){
  const slots=_loadAutoBackups();
  const slot=slots[idx];
  if(!slot||!Array.isArray(slot.groups)||!slot.groups.length){toast('백업 데이터가 없어요',{type:'error'});return;}
  if(!confirm(`"${slot.reason||'자동 백업'}" (${slot.savedAt?slot.savedAt.slice(0,16).replace('T',' '):'?'}) 시점으로 복원할까요?`))return;
  groups=slot.groups;currentGroupId=slot.currentGroupId||groups[0].id;
  const g=getCurrentGroup()||groups[0];currentGroupId=g.id;loadGroupData(g);
  saveState();renderAll();
  toast('자동 백업에서 복원됐어요',{type:'success'});

function _showAutoBackupList(){

// ── Dropbox 자동 동기화 ──
const DBX_MAIN_FILE='/01_Personal/Dutch-Pay/dutch-pay_data.json';
const DBX_LASTSYNC_MAIN='dutchpay_dbx_lastsync_main';
// history.html과 동일한 localStorage 키 공유 (같은 도메인 = 같은 계정)
function dbxGetToken(){return localStorage.getItem('dutchpay_dbx_token');}
async function _dbxRefreshToken(){
  const refresh=localStorage.getItem('dutchpay_dbx_refresh');
  const appKey=localStorage.getItem('dutchpay_dbx_appkey');
  if(!refresh||!appKey)return null;
  try{const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:refresh,client_id:appKey})});const data=await res.json();if(data.access_token){localStorage.setItem('dutchpay_dbx_token',data.access_token);return data.access_token;}return null;}catch(e){return null;}
}
async function _dbxUpload(token,path,content){
  const arg=JSON.stringify({path,mode:'overwrite',autorename:false,mute:true}).replace(/[^\x00-\x7F]/g,c=>`\\u${c.charCodeAt(0).toString(16).padStart(4,'0')}`);
  const res=await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/octet-stream','Dropbox-API-Arg':arg},body:content});
  if(res.status===401){const t=await _dbxRefreshToken();if(t)return _dbxUpload(t,path,content);}
  return res.ok;
}
async function _dbxDownload(token,path){
  const res=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Dropbox-API-Arg':JSON.stringify({path})}});
  if(res.status===409)return null;if(res.status===401){const t=await _dbxRefreshToken();if(t)return _dbxDownload(t,path);return null;}if(!res.ok)return null;
  try{return JSON.parse(await res.text());}catch(e){return null;}
}
let _syncTimer=null,_syncing=false,_syncFromRunning=false;
function _scheduleSyncToDropbox(){
  if(!dbxGetToken())return;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>syncFromDropbox(),3000);
}
async function syncToDropbox(){
  if(_syncing||!dbxGetToken())return;
  _syncing=true;
  try{
    syncCurrentToGroup();
    const ok=await _dbxUpload(dbxGetToken(),DBX_MAIN_FILE,JSON.stringify({version:2,groups,currentGroupId,deletedGroups,syncedAt:new Date().toISOString()}));
    if(ok){
      localStorage.setItem(DBX_LASTSYNC_MAIN,new Date().toISOString());
      const hashes={};groups.forEach(g=>{hashes[g.id]=_groupHash(g);});
      _saveSyncedHashes(hashes);
      _updateSyncBadge();
    }
  }catch(e){}finally{_syncing=false;}
}
async function syncFromDropbox(){
  const token=dbxGetToken();if(!token)return;
  if(_syncFromRunning)return;_syncFromRunning=true;
  try{
    const remote=await _dbxDownload(token,DBX_MAIN_FILE);
    if(!remote||!Array.isArray(remote.groups)||!remote.groups.length){await syncToDropbox();return;}

    // 삭제 툼스톤 병합 (양쪽 tombstone 합집합)
    const mergedDeleted={...deletedGroups,...(remote.deletedGroups||{})};

    // 동기화 기준선 해시 (양쪽이 baseline에서 모두 변경됐을 때만 충돌)
    const baseHashes=_loadSyncedHashes();

    const mergedGroups=[...groups];
    const conflicts=[];
    (remote.groups||[]).forEach(rg=>{
      if(mergedDeleted[rg.id])return; // 삭제된 그룹 무시
      const li=mergedGroups.findIndex(lg=>lg.id===rg.id);
      if(li===-1){
        mergedGroups.push(rg);
      }else{
        const lg=mergedGroups[li];
        const baseHash=baseHashes[rg.id]||null;
        const localHash=_groupHash(lg);
        const remoteHash=_groupHash(rg);
        const localChanged=baseHash===null||localHash!==baseHash;
        const remoteChanged=baseHash===null||remoteHash!==baseHash;
        if(localChanged&&remoteChanged&&localHash!==remoteHash){
          conflicts.push({id:rg.id,local:lg,remote:rg,idx:li});
        }else if(remoteChanged){
          mergedGroups[li]=rg;
        }
        // else: 로컬만 변경됐거나 동일 → 로컬 유지
      }
    });

    // 로컬에 남은 그룹 중 tombstone에 있는 것 제거
    const filtered=mergedGroups.filter(g=>!mergedDeleted[g.id]);

    if(conflicts.length){
      _autoBackup('Dropbox 충돌 감지');
      _showSyncConflictUI(conflicts,filtered,remote.currentGroupId,mergedDeleted);
      return;
    }

    const changed=JSON.stringify(filtered)!==JSON.stringify(groups)||JSON.stringify(mergedDeleted)!==JSON.stringify(deletedGroups);
    if(changed)toast('Dropbox에서 최신 내용을 병합했어요',{type:'success'});
    await _applySyncMerge(filtered,remote.currentGroupId,mergedDeleted);
  }catch(e){}finally{_syncFromRunning=false;}
}
async function _applySyncMerge(mergedGroups,remoteCurrentId,mergedDeleted){
  groups=mergedGroups;
  if(mergedDeleted)deletedGroups=mergedDeleted;
  // 스냅샷 선-적재: loadGroupData 후 syncCurrentToGroup이 updatedAt을 건드리지 않도록
  groups.forEach(g=>{_syncSnapshots[g.id]=JSON.stringify(g.data);});
  if(!getCurrentGroup()&&groups.length)currentGroupId=groups[0].id;
  const g=getCurrentGroup()||groups[0];
  if(g){currentGroupId=g.id;loadGroupData(g);}
  localStorage.setItem(STORAGE_KEY,JSON.stringify({version:3,savedAt:new Date().toISOString(),groups,currentGroupId,deletedGroups}));
  localStorage.setItem(DBX_LASTSYNC_MAIN,new Date().toISOString());
  const hashes={};groups.forEach(g=>{hashes[g.id]=_groupHash(g);});
  _saveSyncedHashes(hashes);
  _updateSyncBadge();renderAll(true);
  await syncToDropbox();
}

function _showSyncConflictUI(conflicts,mergedGroups,remoteCurrentId,mergedDeleted){
  document.getElementById('syncConflictOv')?.remove();
  const choices={};conflicts.forEach(c=>{choices[c.id]='local';});
  function _scFmtDate(iso){if(!iso)return '';try{const d=new Date(iso);return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}
  function _scFmtGroup(g){const items=(g.data&&g.data.items)||[];const total=items.reduce((s,it)=>s+(+it.amount||0),0);const ppl=((g.data&&g.data.people)||[]).join(', ')||g.name||'그룹';return{ppl,cnt:items.length,total:fmt(total)+'원',at:_scFmtDate(g.updatedAt)};}
  const cards=conflicts.map(c=>{const l=_scFmtGroup(c.local),r=_scFmtGroup(c.remote);return `<div class="sc-card" data-cid="${e(c.id)}"><div class="sc-card-title">${e(c.local.name||c.id)}</div><div class="sc-versions"><button class="sc-ver sc-local on" onclick="_scPick(${ja(c.id)},'local')"><div class="sc-ver-hd">📱 이 기기</div><div class="sc-ver-sub">${e(l.ppl)}</div><div class="sc-ver-row"><span>${l.cnt}건</span><span>${l.total}</span></div><div class="sc-ver-at">${e(l.at)}</div></button><button class="sc-ver sc-remote" onclick="_scPick(${ja(c.id)},'remote')"><div class="sc-ver-hd">☁ Dropbox</div><div class="sc-ver-sub">${e(r.ppl)}</div><div class="sc-ver-row"><span>${r.cnt}건</span><span>${r.total}</span></div><div class="sc-ver-at">${e(r.at)}</div></button></div></div>`;}).join('');
  const ov=document.createElement('div');ov.id='syncConflictOv';ov.className='sc-overlay';
  ov.innerHTML=`<div class="sc-modal"><div class="sc-hd">⚠️ 동기화 충돌</div><div class="sc-desc">두 기기에서 같은 그룹을 동시에 수정했어요.<br>유지할 버전을 선택해주세요.</div>${cards}<button class="sc-confirm" onclick="_scConfirm()">선택 완료</button></div>`;
  document.body.appendChild(ov);
  window._scConflictState={conflicts,mergedGroups,remoteCurrentId,choices,mergedDeleted};
}
function _scPick(id,choice){
  if(!window._scConflictState)return;
  window._scConflictState.choices[id]=choice;
  const card=document.querySelector(`.sc-card[data-cid="${CSS.escape(id)}"]`);

async function _scConfirm(){
  if(!window._scConflictState)return;
  const{conflicts,mergedGroups,remoteCurrentId,choices,mergedDeleted}=window._scConflictState;
  conflicts.forEach(c=>{const li=mergedGroups.findIndex(g=>g.id===c.id);if(li!==-1&&choices[c.id]==='remote')mergedGroups[li]=c.remote;});
  document.getElementById('syncConflictOv')?.remove();

function _checkAutoDelete(){if(_justAddedId===null)return;const id=_justAddedId;_justAddedId=null;const it=items.find(i=>i.id===id);if(it&&!it.name&&(!it.amount||+it.amount===0)){items=items.filter(i=>i.id!==id);if(selectedId===id)selectedId=null;renderItemLists();refreshMobItems();saveState();}}

function updateField(id,field,val){const it=items.find(i=>i.id===id);if(!it)return;it[field]=val;if(_justAddedId===id&&(field==='name'||field==='amount')&&val)_justAddedId=null;renderItemLists();refreshMobItems();updateTotals();if(field==='name'){document.getElementById('dREye').textContent='지출 편집';document.getElementById('dRTitle').textContent=val||'새 지출';const mst=document.getElementById('mSheetTitle');if(mst)mst.textContent=val||'새 지출';}saveState();}

function toggleMember(id,name,btn){const it=items.find(i=>i.id===id);if(!it)return;if(!it.watchers)it.watchers=[];const isIn=it.members.includes(name);const isW=it.watchers.includes(name);if(isIn){// 포함 → 깍두기
if(it.members.length>1)it.members=it.members.filter(m=>m!==name);else return;it.watchers.push(name);}else if(isW){// 깍두기 → 제외
it.watchers=it.watchers.filter(w=>w!==name);}else{// 제외 → 포함

async function _dbxRenameExistingFiles(){
  const token=hDbxGetToken();
  if(!token){toast('Dropbox가 연결되지 않았어요',{type:'error'});return;}
  toast('Dropbox 파일 목록 확인 중...');
  try{
    // 폴더 내 파일 목록 수집 (페이지네이션 포함)
    let entries=[];
    let res=await fetch('https://api.dropboxapi.com/2/files/list_folder',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({path:'/01_Personal/Dutch-Pay',recursive:false,include_non_downloadable_files:false})});
    if(res.status===401){const t=await _dbxRefreshToken();if(t)return _dbxRenameExistingFiles();}
    if(!res.ok){toast('폴더 목록을 가져오지 못했어요',{type:'error'});return;}
    let data=await res.json();
    entries.push(...(data.entries||[]));
    while(data.has_more){
      res=await fetch('https://api.dropboxapi.com/2/files/list_folder/continue',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({cursor:data.cursor})});
      if(!res.ok)break;
      data=await res.json();
      entries.push(...(data.entries||[]));
    }
    // 이름 변경 대상 추출
    const toRename=[];
    for(const entry of entries){
      if(entry['.tag']!=='file')continue;
      const name=entry.name;
      const newName=name.replace(/더치페이|dutch\s*pay/gi,'정산내역');
      if(newName!==name)toRename.push({fromPath:entry.path_lower,toPath:`/01_Personal/Dutch-Pay/${newName}`});
    }
    if(!toRename.length){toast('변경할 파일이 없어요 (이미 최신 이름)',{type:'success'});return;}
    const preview=toRename[0].toPath.split('/').pop();
    if(!confirm(`${toRename.length}개 파일의 이름을 변경할까요?\n예시: ${preview}`))return;
    // 파일 이동 (이름 변경)
    let done=0,fail=0;
    for(const{fromPath,toPath} of toRename){
      const tk=hDbxGetToken();
      const r=await fetch('https://api.dropboxapi.com/2/files/move_v2',{method:'POST',headers:{'Authorization':`Bearer ${tk}`,'Content-Type':'application/json'},body:JSON.stringify({from_path:fromPath,to_path:toPath,autorename:false})});
      if(r.ok)done++;else fail++;
    }
    if(fail===0)toast(`${done}개 파일 이름 변경 완료 ✓`,{type:'success'});
    else toast(`${done}개 변경됨 · ${fail}개 실패`,{type:'error'});
  }catch(e){toast('파일 이름 변경 중 오류가 발생했어요',{type:'error'});}
}

function pmUpdateAmt(key,el){
  const pm=_getPayment(key);
  const posFromEnd=el.value.length-el.selectionEnd;
  const raw=el.value.replace(/[^0-9]/g,'');
  if(raw===''){pm.amount=null;el.value='';}
  else{const n=parseInt(raw,10);pm.amount=n;el.value=n.toLocaleString('ko-KR');const newPos=Math.max(0,el.value.length-posFromEnd);el.setSelectionRange(newPos,newPos);}
  payments[key]=pm;saveState();
  const item=document.querySelector(`.txn-item[data-pm-key="${CSS.escape(key)}"]`);
  if(!item)return;
  const panel=item.querySelector('.pay-panel');if(!panel)return;
  const diffVal=(pm.amount!==null&&pm.amount!=='')?(+pm.amount-(window._txnAmtMap[key]||0)):null;
  let badge=panel.querySelector('.pay-diff-badge');
  if(diffVal!==null){
    const cls=diffVal>0?'pos':diffVal<0?'neg':'zero';
    const txt=(diffVal>0?'+':'')+fmt(diffVal)+'원';
    if(!badge){badge=document.createElement('span');badge.className='pay-diff-badge '+cls;const row=panel.querySelectorAll('.pay-panel-row')[1];if(row)row.appendChild(badge);}
    badge.className='pay-diff-badge '+cls;badge.textContent=txt;

  _patchPmRow(key);_patchSummary();
}

  const hasAmt=pm.amount!==null&&pm.amount!==''&&!isNaN(+pm.amount);
  const diff=hasAmt?(+pm.amount-(window._txnAmtMap[key]||0)):null;

  row.classList.toggle('pm-done',isGreen);row.classList.toggle('pm-diff',isRed);

  if(right){
    const amtEl=right.querySelector('.txn-amt');

    if(amtEl)amtEl.className='txn-amt'+(isGreen?' done-clr':isRed?' neg-clr':'');

  }
}

// ── 순수 계산 함수 ──────────────────────────────────────────────────────────
function computeShares(){
  const paid={},owes={},details={},owesFloat={};
  people.forEach(p=>{paid[p]=0;owes[p]=0;details[p]=[];owesFloat[p]=0;});
  const payerSet={};
  items.forEach(it=>{
    if(!it.amount||+it.amount===0)return;if(it.isTreat)return;
    const amt=+it.amount,mems=it.members.length?it.members:[...people],n=mems.length;
    paid[it.payer]=(paid[it.payer]||0)+amt;
    if(it.payer)payerSet[it.payer]=true;
    const override=it.rounderOverride;
    if(override&&mems.includes(override)){
      const base=Math.floor(amt/n),rem=amt-base*n;
      mems.forEach(p=>{const share=p===override?base+rem:base;owesFloat[p]=(owesFloat[p]||0)+share;details[p].push({name:it.name||'(이름 없음)',payer:it.payer,share,extra:p===override&&rem>0});});
    }else{
      const exact=amt/n;
      mems.forEach(p=>{owesFloat[p]=(owesFloat[p]||0)+exact;details[p].push({name:it.name||'(이름 없음)',payer:it.payer,share:exact,extra:false});});
    }
  });
  const totalAmt=items.filter(it=>!it.isTreat).reduce((s,it)=>s+(+it.amount||0),0);
  let totalFloor=0;const fracParts=[];
  people.forEach(p=>{const f=owesFloat[p]||0;const fl=Math.floor(f);owes[p]=fl;totalFloor+=fl;fracParts.push({p,frac:f-fl});});
  let diff=Math.round(totalAmt-totalFloor);
  if(diff!==0){fracParts.sort((a,b)=>{const ap=payerSet[a.p]?1:0,bp=payerSet[b.p]?1:0;if(ap!==bp)return bp-ap;return b.frac-a.frac;});if(fracParts.length)owes[fracParts[0].p]+=diff;}
  return{paid,owes,details,hasRounding:diff!==0};
}

// calcTxns: 최소 송금 수로 정산 (그리디, 채권·채무 반복 상계)
function calcTxns(paid,owes){
  const bal={};people.forEach(p=>{bal[p]=(paid[p]||0)-(owes[p]||0);});
  const creds=[],debts=[];
  Object.entries(bal).forEach(([p,b])=>{if(b>0.5)creds.push({p,b});else if(b<-0.5)debts.push({p,b:-b});});
  creds.sort((a,z)=>z.b-a.b);debts.sort((a,z)=>z.b-a.b);
  const txns=[],cs=creds.map(c=>({...c})),ds=debts.map(d=>({...d}));
  let ci=0,di=0;
  while(ci<cs.length&&di<ds.length){const c=cs[ci],d=ds[di],amt=Math.min(c.b,d.b);if(amt>0.5)txns.push({from:d.p,to:c.p,amt:Math.round(amt)});c.b-=amt;d.b-=amt;if(c.b<0.5)ci++;if(d.b<0.5)di++;}
  return txns;
}

function _itMembersHtml(it){const mems=it.members.length?it.members:people;const ws=(it.watchers||[]).filter(w=>!mems.includes(w));if(it.isTreat)return[...mems,...ws].map(m=>e(m)).join(', ');return[...mems.map(m=>e(m)),...ws.map(w=>`${e(w)}(깍두기)`)].join(', ');}
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/"/g,'&quot;');}
function ja(s){return JSON.stringify(String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtAmt(v){if(v===''||v===null||v===undefined)return '';const n=+v;return isNaN(n)||n===0?'':n.toLocaleString('ko-KR');}

function handleAmtKeydown(e){if(['Backspace','Delete','Tab','Escape','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key))return;if((e.ctrlKey||e.metaKey)&&['a','c','v','x','z'].includes(e.key.toLowerCase()))return;if(/^\d$/.test(e.key))return;if(e.key==='-'){const el=e.target,start=el.selectionStart;if(start===0&&!el.value.startsWith('-'))return;}e.preventDefault();}

function handleAmtInput(id,el){const posFromEnd=el.value.length-el.selectionStart;const sign=el.value.trim().startsWith('-')?-1:1;const raw=el.value.replace(/[^0-9]/g,'');let num='';if(raw!==''){num=parseInt(raw,10)*sign;}el.value=num===''?'':(num<0?'-'+Math.abs(num).toLocaleString('ko-KR'):num.toLocaleString('ko-KR'));const newPos=Math.max(0,el.value.length-posFromEnd);el.setSelectionRange(newPos,newPos);updateField(id,'amount',num);}

function saveToHistory(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);
  if(!total){toast('저장할 정산 내역이 없어요',{type:'error'});return;}
  const{paid,owes}=computeShares();
  const txns=calcTxns(paid,owes);
  const g=getCurrentGroup();
  const record={
    id:'h'+Date.now()+Math.floor(Math.random()*1000),
    savedAt:new Date().toISOString(),
    groupName:g?g.name:'',
    dateStart:settleDateStart,
    dateEnd:settleDateEnd,
    people:[...people],
    total,
    items:JSON.parse(JSON.stringify(items)),
    txns,
    payments:JSON.parse(JSON.stringify(payments))
  };
  try{
    const raw=localStorage.getItem(HISTORY_KEY);
    const arr=raw?JSON.parse(raw):[];
    const dupIdx=arr.findIndex(r=>_histFingerprint(r)===_histFingerprint(record));
    if(dupIdx>=0){
      arr[dupIdx]={...arr[dupIdx],payments:record.payments,txns:record.txns,savedAt:record.savedAt};
      localStorage.setItem(HISTORY_KEY,JSON.stringify(arr));
      toast('입금 현황이 기록에 업데이트됐어요 ✓',{type:'success',action:()=>goToHistory(),actionLabel:'보기'});
    }else{
      arr.unshift(record);
      localStorage.setItem(HISTORY_KEY,JSON.stringify(arr));
      toast('기록 보관함에 저장됐어요 ✓',{type:'success',action:()=>goToHistory(),actionLabel:'보기'});
    }
    if(hDbxGetToken())hSyncDropbox(true);
  }catch(err){
    toast('저장에 실패했어요',{type:'error'});
  }
}

const DBX_H_APPKEY='dutchpay_dbx_appkey';
const DBX_H_TOKEN='dutchpay_dbx_token';
const DBX_H_REFRESH='dutchpay_dbx_refresh';
const DBX_H_ACCOUNT='dutchpay_dbx_account';
const DBX_H_LASTSYNC='dutchpay_dbx_lastsync';
const DBX_H_FILE='/01_Personal/Dutch-Pay/dutch-pay_history.json';
const svgArrowH='<svg width="13" height="13" viewBox="0 0 24 24"><line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M13 6 L22 12 L13 18 Z" fill="currentColor"/></svg>';

function loadHistory(){try{const r=localStorage.getItem(HISTORY_KEY);return r?JSON.parse(r):[];}catch(e){return [];}}
function _loadDelIds(){try{return new Set(JSON.parse(localStorage.getItem(HISTORY_DEL_KEY)||'[]'));}catch(e){return new Set();}}
function _saveDelId(id){try{const s=_loadDelIds();s.add(id);localStorage.setItem(HISTORY_DEL_KEY,JSON.stringify([...s]));}catch(e){}}
function _mergeDelIds(remoteIds){try{const s=_loadDelIds();(remoteIds||[]).forEach(id=>s.add(id));localStorage.setItem(HISTORY_DEL_KEY,JSON.stringify([...s]));return s;}catch(e){return _loadDelIds();}}
function _histFingerprint(r){return[r.dateStart||'',r.dateEnd||'',(r.people||[]).slice().sort().join('|'),(r.items||[]).map(i=>`${i.name||''}|${+i.amount||0}|${i.payer||''}|${i.isTreat?1:0}`).sort().join(',')].join('§');}
function _dedupHistory(arr){const map=new Map();arr.forEach(r=>{const fp=_histFingerprint(r);const ex=map.get(fp);if(!ex){map.set(fp,r);}else{const isNewer=(r.savedAt||'')>(ex.savedAt||'');const winner=isNewer?r:ex,loser=isNewer?ex:r;map.set(fp,{...winner,payments:{...(loser.payments||{}),...(winner.payments||{})}});}});return Array.from(map.values());}
function saveHistory(arr){try{const deduped=_dedupHistory(arr);const removed=arr.length-deduped.length;localStorage.setItem(HISTORY_KEY,JSON.stringify(deduped));if(removed>0)setTimeout(()=>toast(`중복 기록 ${removed}건 자동 삭제됐어요`,{type:'info'}),50);}catch(e){toast('저장 공간이 부족해 기록을 저장하지 못했어요',{type:'error'});}}
function _deduplicateHistoryOnStartup(){try{const arr=loadHistory();if(arr.length<2)return;const deduped=_dedupHistory(arr);const removed=arr.length-deduped.length;if(removed>0){localStorage.setItem(HISTORY_KEY,JSON.stringify(deduped));setTimeout(()=>toast(`중복 기록 ${removed}건 자동 삭제됐어요`,{type:'info'}),400);}}catch(e){}}
function _migrateHistoryGroupNames(){try{const arr=loadHistory();let changed=false;arr.forEach(r=>{const correct=(r.people||[]).join(', ');if(correct&&r.groupName!==correct){r.groupName=correct;changed=true;}});if(changed)saveHistory(arr);}catch(e){}}

function deleteHistoryRecord(id){

function toggleRcTxnPanel(recId,txnKey){
  const row=document.querySelector(`.rc-txn-row[data-rec-id="${CSS.escape(recId)}"][data-txn-key="${CSS.escape(txnKey)}"]`);
  if(!row)return;

  if(next&&next.classList.contains('rc-txn-edit-panel')){next.remove();return;}
  document.querySelectorAll('.rc-txn-edit-panel').forEach(p=>p.remove());
  const allRec=loadHistory();const rec=allRec.find(r=>r.id===recId);if(!rec)return;
  const pm=(rec.payments||{})[txnKey]||{};
  const txn=(rec.txns||[]).find(t=>`${t.from}|${t.to}`===txnKey);
  const baseAmt=txn?txn.amt:0;
  const diffVal=(pm.amount!=null&&pm.amount!=='')?(+pm.amount-baseAmt):null;
  const diffHtml=diffVal!==null?`<span class="pay-diff-badge ${diffVal>0?'pos':diffVal<0?'neg':'zero'}">${diffVal>0?'+':''}${fmt(diffVal)}원</span>`:'';
  const panel=document.createElement('div');panel.className='rc-txn-edit-panel';

" onclick="_closeRcTxnPanel('${ea(recId)}','${ea(txnKey)}')">저장</button>`;
  row.insertAdjacentElement('afterend',panel);

function rcTxnToggleDone(recId,txnKey){
  const allRec=loadHistory();const rec=allRec.find(r=>r.id===recId);if(!rec)return;
  if(!rec.payments)rec.payments={};if(!rec.payments[txnKey])rec.payments[txnKey]={};
  rec.payments[txnKey].done=!rec.payments[txnKey].done;
  saveHistory(allRec);_patchHistResults();
  if(rec.payments[txnKey].done)_checkAllPaidAutoSaveForRec(rec);
  const panel=document.querySelector(`.rc-txn-edit-panel[data-rec-id="${CSS.escape(recId)}"][data-txn-key="${CSS.escape(txnKey)}"]`);
  if(panel){const done=rec.payments[txnKey].done;const track=panel.querySelector('.pay-toggle-track');const lbl=panel.querySelector('.pay-toggle-lbl');if(track)track.className='pay-toggle-track'+(done?' on':'');if(lbl){lbl.className='pay-toggle-lbl'+(done?' on':'');lbl.textContent=done?'입금완료':'미입금';}}
}
function rcTxnUpdate(recId,txnKey,field,val){
  const allRec=loadHistory();const rec=allRec.find(r=>r.id===recId);if(!rec)return;
  if(!rec.payments)rec.payments={};if(!rec.payments[txnKey])rec.payments[txnKey]={};
  rec.payments[txnKey][field]=val;saveHistory(allRec);_patchHistResults();
}
function rcTxnUpdateAmt(recId,txnKey,el){
  const raw=el.value.replace(/,/g,'');const num=raw===''?null:+raw;if(raw!==''&&isNaN(num))return;
  const allRec=loadHistory();const rec=allRec.find(r=>r.id===recId);if(!rec)return;
  if(!rec.payments)rec.payments={};if(!rec.payments[txnKey])rec.payments[txnKey]={};
  rec.payments[txnKey].amount=num;saveHistory(allRec);_patchHistResults();
  const panel=el.closest('.rc-txn-edit-panel');
  if(panel){const txn=(rec.txns||[]).find(t=>`${t.from}|${t.to}`===txnKey);const baseAmt=txn?txn.amt:0;const diffVal=num!==null?(num-baseAmt):null;const existing=panel.querySelector('.pay-diff-badge');const row=el.closest('.pay-panel-row');if(diffVal!==null){const dh=`<span class="pay-diff-badge ${diffVal>0?'pos':diffVal<0?'neg':'zero'}">${diffVal>0?'+':''}${fmt(diffVal)}원</span>`;if(existing)existing.outerHTML=dh;else if(row)row.insertAdjacentHTML('beforeend',dh);}else if(existing){existing.remove();}}
}
function rcTxnSetNow(recId,txnKey){
  const now=new Date();const ts=new Date(now-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  const allRec=loadHistory();const rec=allRec.find(r=>r.id===recId);if(!rec)return;
  if(!rec.payments)rec.payments={};if(!rec.payments[txnKey])rec.payments[txnKey]={};
  rec.payments[txnKey].timestamp=ts;saveHistory(allRec);_patchHistResults();
  const panel=document.querySelector(`.rc-txn-edit-panel[data-rec-id="${CSS.escape(recId)}"][data-txn-key="${CSS.escape(txnKey)}"]`);

async function hDbxConnect(){

  location.href=`https://www.dropbox.com/oauth2/authorize?${params}`;
}

    if(data.error)throw new Error(data.error_description||data.error);
    localStorage.setItem(DBX_H_TOKEN,data.access_token);

async function _hSha256b64url(str){const data=new TextEncoder().encode(str);const hash=await crypto.subtle.digest('SHA-256',data);return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function _hRandomStr(len){const arr=new Uint8Array(len);crypto.getRandomValues(arr);return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'').slice(0,len);}

function roundRectPath(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

const iconImgCache=new Map();
async function loadIconImage(svgStr,color){const key=svgStr+'|'+color;if(iconImgCache.has(key))return iconImgCache.get(key);const colored=svgStr.replace(/currentColor/g,color);const withNs=colored.includes('xmlns')?colored:colored.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"');const blob=new Blob([withNs],{type:'image/svg+xml;charset=utf-8'});const url=URL.createObjectURL(blob);try{const img=new Image();await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});iconImgCache.set(key,img);return img;}finally{setTimeout(()=>URL.revokeObjectURL(url),1000);}}

function formatShareDate(startDate,endDate){
  const fmtDate=(iso)=>{
    if(!iso)return '';
    return iso.replaceAll('-','.');
  };

  if(!startDate)return '';
  if(!endDate||startDate===endDate)return fmtDate(startDate);
  return `${fmtDate(startDate)} - ${fmtDate(endDate)}`;
}

function truncateCanvasText(ctx,text,maxWidth){
  const raw=String(text||'');
  if(maxWidth<=0)return '';
  if(ctx.measureText(raw).width<=maxWidth)return raw;
  const ellipsis='…';
  if(ctx.measureText(ellipsis).width>maxWidth)return '';
  let lo=0,hi=raw.length,best=ellipsis;
  while(lo<=hi){
    const mid=Math.floor((lo+hi)/2);
    const next=raw.slice(0,mid)+ellipsis;
    if(ctx.measureText(next).width<=maxWidth){best=next;lo=mid+1;}
    else hi=mid-1;
  }
  return best;
}

function _isAlreadySaved(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);if(!total)return false;
  const record={dateStart:settleDateStart,dateEnd:settleDateEnd,people:[...people],items:JSON.parse(JSON.stringify(items))};
  const fp=_histFingerprint(record);return loadHistory().some(r=>_histFingerprint(r)===fp);
}
function _afterShare(){
  if(_isAlreadySaved()){toast('이미지 공유 완료',{type:'success'});return;}
  toast('공유 완료 — 기록 보관함에도 저장할까요?',{type:'success',action:()=>saveToHistory(),actionLabel:'저장'});
}
async function shareSettleImage(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);if(!total){toast('공유할 정산 내역이 없어요',{type:'error'});return;}
  const inApp=detectInAppBrowser();if(inApp){const ok=confirm(`${inApp.name} 내부 브라우저는 이미지 공유가 제한돼요.\n외부 브라우저에서 열어주세요.\n\n지금 외부 브라우저로 열까요?`);if(ok){openInExternalBrowser();return;}}
  const canvas=await generateSettleCanvas();const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));if(!blob){toast('이미지 생성에 실패했어요',{type:'error'});return;}
  const date=new Date().toISOString().slice(0,10);const filename=`정산_${date}.png`;const file=new File([blob],filename,{type:'image/png'});
  if(navigator.share&&!inApp){try{await navigator.share({files:[file]});_afterShare();return;}catch(e){if(e&&e.name==='AbortError')return;}}
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=filename;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  _afterShare();
}
