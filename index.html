
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>더치페이</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-title" content="더치페이"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F7F8;--card:#fff;--left-bg:#FAFAFA;
  --label:#111;--label2:#666;--label3:#B0B0B8;
  --sep:#EBEBED;--sep2:#D4D4D8;--fill:#F3F3F5;--fill2:#F8F8FA;
  --blue:#0071E3;--blue-bg:#EBF3FF;--blue-txt:#0055B8;
  --green:#1DAD53;--green-bg:#EDFAF3;--green-txt:#13823D;
  --red:#E53E3E;--red-bg:#FFF0F0;
  --r:16px;--rm:10px;--rs:9px;--pad-x:32px;
}
html,body{background:var(--bg);font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;font-size:14px;color:var(--label);min-height:100vh;}
input,select,button{font-family:inherit;}
input[type="date"]{-webkit-appearance:none;-moz-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>");background-repeat:no-repeat;background-position:right 8px center;background-size:14px 14px;padding-right:28px !important;cursor:pointer;position:relative;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:0;position:absolute;right:0;top:0;width:34px;height:100%;cursor:pointer;margin:0;padding:0;}
input[type="date"]::-webkit-inner-spin-button,input[type="date"]::-webkit-clear-button{display:none;-webkit-appearance:none;}
button{cursor:pointer;}
svg{display:block;flex-shrink:0;}

.desktop-shell{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:48px 32px 80px;}
.desktop-app{display:grid;grid-template-columns:380px minmax(0,1fr);min-height:660px;width:100%;max-width:1100px;background:var(--card);border-radius:var(--r);border:1px solid var(--sep);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);}
.mobile-shell{display:none;}

@media(max-width:700px){
  .desktop-shell{display:none;}
  .mobile-shell{display:block;background:var(--bg);min-height:100vh;}
  .mob-header{background:var(--card);padding:max(20px,calc(env(safe-area-inset-top,0px) + 12px)) 20px 4px;border-bottom:1px solid var(--sep);}
  .mob-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .mob-title{font-size:22px;font-weight:700;letter-spacing:-.4px;}
  .mob-tabs{display:flex;gap:0;}
  .mob-tab{flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--label2);padding:10px 0 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
  .mob-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
  .mob-body{padding:16px 16px 100px;}
  .mob-section{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
  .mob-section-hd{padding:14px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between;}
  .mob-section-title{font-size:12px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;}
  .mob-clear-btn{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;}
  .mob-pin-wrap{padding:12px 16px;}
  .mob-pin-row{display:flex;gap:8px;margin-bottom:8px;}
  .mob-pin-row input{flex:1;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;min-width:0;}
  .mob-pin-row input:focus{border-color:var(--blue);}
  .mob-add-btn{border:none;background:var(--label);color:#fff;border-radius:var(--rs);padding:9px 16px;font-size:14px;font-weight:600;}
  .mob-hint{font-size:11px;color:var(--label3);margin-bottom:10px;}
  .mob-pills{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 14px;}
  .mob-empty-pills{padding:0 16px 14px;font-size:13px;color:var(--label3);}
  .mob-item-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer;animation:rowIn .25s ease;}
  .mob-item-row:last-child{border-bottom:none;}
  .mob-item-row.sel{background:var(--fill2);}
  .mob-item-dot{width:6px;height:6px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
  .mob-item-row.sel .mob-item-dot{background:var(--blue);}
  .mob-item-info{flex:1;min-width:0;}
  .mob-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mob-item-meta{font-size:11px;color:var(--label3);margin-top:2px;}
  .mob-item-amt{font-size:14px;font-weight:700;}
  .mob-add-item-row{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;}
  .mob-add-ic{width:24px;height:24px;border-radius:50%;background:var(--green-bg);color:var(--green-txt);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;}
  .mob-add-txt{font-size:14px;font-weight:500;color:var(--green);}
  .mob-total-bar{background:var(--card);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .mob-total-lbl{font-size:13px;color:var(--label2);}
  .mob-total-val{font-size:20px;font-weight:700;}
  .mob-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;}
  .mob-sheet-overlay.open{display:block;}
  .mob-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:0 0 40px;max-height:85vh;overflow-y:auto;z-index:101;transform:translateY(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1);}
  .mob-sheet.open{transform:translateY(0);}
  .mob-sheet-handle{width:36px;height:4px;background:var(--sep2);border-radius:2px;margin:12px auto 16px;}
  .mob-sheet-title{font-size:16px;font-weight:700;padding:0 20px 16px;border-bottom:1px solid var(--sep);}
  .mob-sheet-body{padding:20px 20px 0;}
  .stat-val{font-size:17px;}
  .stat-box{padding:14px 10px;}
}

.left{border-right:1px solid var(--sep);display:flex;flex-direction:column;background:var(--left-bg);}
.left-top{padding:28px var(--pad-x) 0;}
.app-label{font-size:11px;font-weight:600;color:var(--label3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.app-version{font-weight:400;letter-spacing:0;opacity:.7;text-transform:none;margin-left:4px;}
.app-title{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.15;margin-bottom:18px;}
.tab-row{display:flex;gap:2px;background:var(--fill);border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--label2);padding:6px 0;border-radius:8px;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--card);color:var(--label);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.people-wrap{padding:0 0 14px;border-bottom:1px solid var(--sep);}
.sec-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-label{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;}
.clear-all-btn{font-size:11px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;cursor:pointer;}
.pin-row{display:flex;gap:6px;margin-bottom:6px;}
.pin-row input{flex:1;border:1px solid var(--sep2);border-radius:var(--rs);padding:7px 10px;font-size:13px;background:var(--card);color:var(--label);outline:none;min-width:0;}
.pin-row input:focus{border-color:var(--blue);}
.pin-btn{border:none;background:var(--label);color:#fff;border-radius:var(--rs);padding:7px 13px;font-size:13px;font-weight:600;}
.pin-hint{font-size:11px;color:var(--label3);margin-bottom:8px;}
.pills{display:flex;flex-wrap:wrap;gap:5px;min-height:20px;}
.pills-empty{font-size:12px;color:var(--label3);}
.amt-neg{color:var(--red);}
.toast-container{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:calc(100% - 32px);max-width:420px;}
.toast{background:var(--label);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:auto;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(20px);transition:opacity .25s,transform .25s;max-width:100%;line-height:1.4;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-msg{flex:1;}
.toast-action{background:transparent;color:#5BB0FF;border:none;font-size:14px;font-weight:700;cursor:pointer;padding:0 4px;font-family:inherit;white-space:nowrap;}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}
.pill{display:inline-flex;align-items:center;gap:3px;background:var(--fill);border:1px solid var(--sep);border-radius:20px;padding:4px 7px 4px 10px;font-size:12px;font-weight:500;white-space:nowrap;animation:pillIn .2s ease;}
@keyframes pillIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.pill-x{border:none;background:none;color:var(--label3);padding:0;display:flex;align-items:center;}
.items-scroll{flex:1;overflow-y:auto;padding:14px 0 0;}
.items-scroll::-webkit-scrollbar{width:3px;}
.items-scroll::-webkit-scrollbar-thumb{background:var(--sep2);border-radius:2px;}
.ilist-label-row{display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad-x);margin-bottom:8px;gap:6px;}
.ilist-label{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;flex-shrink:0;}
.ilist-tools{display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end;}
.ilist-search{flex:1;max-width:140px;min-width:0;font-size:12px;padding:4px 8px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label);outline:none;}
.ilist-search:focus{border-color:var(--blue);}
.ilist-sort{font-size:11px;padding:4px 6px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label2);font-family:inherit;cursor:pointer;}
.ilist-sort:focus{border-color:var(--blue);}
.ilist-results-empty{padding:24px var(--pad-x);font-size:13px;color:var(--label3);text-align:center;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px var(--pad-x);border-bottom:1px solid var(--sep);cursor:pointer;transition:background .12s;animation:rowIn .25s ease;}
@keyframes rowIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.item-row:hover,.item-row.sel{background:var(--fill);}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
.item-row.sel .item-dot{background:var(--blue);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--label3);margin-top:1px;}
.item-amt{font-size:13px;font-weight:700;flex-shrink:0;}
.add-row{display:flex;align-items:center;gap:10px;padding:11px var(--pad-x);cursor:pointer;transition:background .1s;}
.add-row:hover{background:var(--fill);}
.add-ic{width:22px;height:22px;border-radius:50%;background:var(--green-bg);color:var(--green-txt);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:400;line-height:1;flex-shrink:0;}
.add-txt{font-size:13px;font-weight:500;color:var(--green);}
.left-foot{border-top:1px solid var(--sep);padding:14px var(--pad-x);}
.foot-row{display:flex;align-items:baseline;justify-content:space-between;}
.foot-lbl{font-size:12px;color:var(--label2);}
.foot-val{font-size:20px;font-weight:700;}

.right{display:flex;flex-direction:column;background:var(--card);}
.right-top{padding:28px 32px 20px;border-bottom:1px solid var(--sep);}
.r-eye{font-size:11px;font-weight:600;color:var(--label3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;}
.r-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.r-sub{font-size:13px;color:var(--label2);line-height:1.55;}
.right-body{flex:1;padding:24px 32px;overflow-y:auto;}
.right-body::-webkit-scrollbar{width:3px;}
.right-body::-webkit-scrollbar-thumb{background:var(--sep2);border-radius:2px;}

.field-g{margin-bottom:18px;}
.field-lbl{font-size:11px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
.field-inp{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;}
.field-inp:focus{border-color:var(--blue);}
.field-sel{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;appearance:none;cursor:pointer;}
.amt-wrap{position:relative;}
.amt-wrap input{padding-left:44px;padding-right:30px;}
.amt-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--label3);pointer-events:none;}
.amt-sign-btn{position:absolute;left:4px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:1px solid var(--sep2);border-radius:50%;background:var(--card);color:var(--label3);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:all .12s;}
.amt-sign-btn:hover{border-color:var(--label3);}
.amt-sign-btn.on{background:var(--red);color:#fff;border-color:var(--red);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{border:1px solid var(--sep2);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;background:var(--card);color:var(--label2);transition:all .12s;}
.chip.on{border-color:var(--label);background:var(--label);color:#fff;}
.del-btn{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:10px;font-size:13px;color:var(--red);background:transparent;margin-top:8px;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.del-btn:hover{background:var(--red-bg);}
.confirm-btn{width:100%;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;background:var(--label);color:#fff;margin-top:16px;cursor:pointer;transition:opacity .12s;}
.confirm-btn:hover{opacity:.85;}

.stat-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-box{background:var(--fill2);border:1px solid var(--sep);border-radius:var(--rm);padding:16px 12px;text-align:center;min-width:0;}
.stat-lbl{font-size:11px;color:var(--label2);font-weight:500;margin-bottom:6px;white-space:nowrap;}
.stat-val{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard{border:1px solid var(--sep);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.phd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--sep);background:var(--fill2);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue-txt);flex-shrink:0;}
.pname-col{flex:1;}
.pname{font-size:14px;font-weight:600;}
.pnet{font-size:11px;margin-top:2px;}
.pnet.pos{color:var(--green);}
.pnet.neg{color:var(--red);}
.pnet.zero{color:var(--label3);}
.ptotal{font-size:17px;font-weight:700;}
.bd-row{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--sep);gap:8px;}
.bd-row:last-child{border-bottom:none;}
.bd-name{font-size:13px;flex:1;color:var(--label2);display:flex;align-items:center;gap:6px;min-width:0;}
.bd-name-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bd-ptag{font-size:11px;color:var(--label3);white-space:nowrap;}
.bd-share{font-size:13px;font-weight:600;}
.bd-ex-tag{font-size:10px;color:var(--blue-txt);background:var(--blue-bg);border-radius:4px;padding:1px 5px;font-weight:500;flex-shrink:0;}

.right-body.settle-mode{background:var(--bg);}
.settle-hero{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);padding:22px 20px;margin-bottom:14px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.sh-num{font-size:34px;font-weight:700;letter-spacing:-.5px;margin-bottom:0;}
.sh-divider{height:1px;background:var(--sep);margin:14px 0;}
.sh-sub{font-size:12px;color:var(--label2);}
.txn-card{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.txn-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:12px;}
.txn-row:last-child{border-bottom:none;}
.txn-people{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.txn-from{font-size:14px;font-weight:600;color:var(--label);}
.txn-arr{color:var(--label);display:flex;align-items:center;}
.txn-to{font-size:14px;font-weight:600;color:var(--label);}
.txn-amt{font-size:15px;font-weight:700;text-align:right;flex-shrink:0;}
.pay-section-title{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;margin-top:18px;margin-bottom:8px;padding:0 2px;}
.pay-section-title:first-child{margin-top:0;}
.pay-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:10px;}
.pay-row:last-child{border-bottom:none;}
.pay-name-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.pay-name{font-size:14px;font-weight:500;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pay-amt{font-size:14px;font-weight:600;text-align:right;flex-shrink:0;}
.adj-chip{font-size:10px;color:var(--blue-txt);background:var(--blue-bg);border:none;border-radius:4px;padding:2px 6px;font-weight:500;flex-shrink:0;font-family:inherit;cursor:pointer;transition:background .1s;}
.adj-chip:hover{background:#D9E9FF;}
.rounder-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:6px;z-index:200;min-width:160px;max-width:240px;}
.group-switcher{display:inline-flex;align-items:center;gap:6px;background:var(--fill);border:1px solid var(--sep);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;color:var(--label);cursor:pointer;font-family:inherit;max-width:100%;}
.group-switcher:hover{background:var(--fill2);border-color:var(--sep2);}
.group-switcher-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
.group-switcher-arrow{color:var(--label3);font-size:10px;flex-shrink:0;}
.data-menu-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--sep);background:var(--fill);border-radius:8px;color:var(--label2);cursor:pointer;padding:0;flex-shrink:0;font-family:inherit;}
.data-menu-btn:hover{background:var(--fill2);color:var(--label);}
.group-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.18);padding:8px;z-index:200;min-width:300px;max-width:360px;}
.group-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:6px 8px 8px;}
.group-list{display:flex;flex-direction:column;gap:4px;max-height:380px;overflow-y:auto;}
.group-card{display:flex;align-items:stretch;border:1px solid var(--sep);border-radius:10px;overflow:hidden;background:var(--card);transition:all .12s;}
.group-card:hover{border-color:var(--sep2);background:var(--fill2);}
.group-card.on{border-color:var(--blue);background:var(--blue-bg);}
.group-card-main{flex:1;min-width:0;display:flex;align-items:center;gap:10px;padding:12px;border:none;background:transparent;cursor:pointer;font-family:inherit;text-align:left;}
.group-card-dot{width:8px;height:8px;border-radius:50%;background:var(--sep2);flex-shrink:0;}

.group-card-info{flex:1;min-width:0;}
.group-card-name{font-size:14px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-card.on .group-card-name{color:var(--blue-txt);}
.group-card-meta{font-size:11px;color:var(--label3);margin-top:3px;display:flex;align-items:center;gap:4px;}
.group-card-people{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.group-card-date{flex-shrink:0;}
.group-card-amt{font-size:13px;font-weight:700;color:var(--label2);flex-shrink:0;margin-left:8px;}
.group-card.on .group-card-amt{color:var(--blue-txt);}
.group-card-more{flex-shrink:0;border:none;background:transparent;color:var(--label3);cursor:pointer;padding:0 14px;font-size:20px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--sep);transition:background .12s,color .12s;letter-spacing:1px;line-height:1;}
.group-card-more:hover{background:var(--fill2);color:var(--label);}
.group-card.on .group-card-more{border-left-color:rgba(0,113,227,.2);color:var(--blue-txt);}
.group-card.on .group-card-more:hover{background:rgba(255,255,255,.4);}
.group-more-pop{position:fixed;background:var(--card);border:1px solid var(--sep);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:4px;z-index:300;min-width:140px;}
.group-more-opt{display:flex;width:100%;text-align:left;align-items:center;gap:8px;border:none;background:transparent;padding:9px 10px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--label);font-family:inherit;}
.group-more-opt:hover{background:var(--fill);}
.group-more-opt.danger{color:var(--red);}
.group-more-opt.danger:hover{background:var(--red-bg);}
.group-add{display:block;width:100%;text-align:center;border:1px dashed var(--sep2);background:transparent;padding:12px;font-size:13px;cursor:pointer;border-radius:10px;color:var(--green);font-family:inherit;font-weight:600;margin-top:6px;}
.group-add:hover{background:var(--green-bg);border-color:var(--green);}
.data-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.15);padding:6px;z-index:200;min-width:220px;}
.data-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:8px 8px 6px;}
.data-pop-btn{display:flex;width:100%;text-align:left;align-items:center;border:none;background:transparent;padding:10px 10px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--label);font-family:inherit;}
.data-pop-btn:hover{background:var(--fill);}
.data-pop-btn.danger{color:var(--red);}
.data-pop-btn.danger:hover{background:var(--red-bg);}
.data-pop-divider{height:1px;background:var(--sep);margin:4px 4px;}
.data-pop-version{padding:10px 10px 6px;font-size:11px;color:var(--label3);text-align:center;letter-spacing:.3px;}
.rounder-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:6px 8px 4px;}
.rounder-opt{display:block;width:100%;text-align:left;border:none;background:transparent;padding:8px 10px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--label);font-family:inherit;}
.rounder-opt:hover{background:var(--fill);}
.rounder-opt.on{color:var(--blue);font-weight:600;}
.pay-ic{cursor:pointer;border:none;font-family:inherit;padding:0;}
.pay-ic:hover{box-shadow:0 0 0 2px var(--blue-bg);}
.icon-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:8px;z-index:200;}
.icon-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:4px 6px 8px;}
.icon-grid{display:grid;grid-template-columns:repeat(5,36px);gap:4px;}
.icon-opt{width:36px;height:36px;border:1px solid var(--sep);background:var(--card);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue-txt);transition:all .12s;padding:0;font-family:inherit;font-size:11px;}
.icon-opt:hover{background:var(--fill);}
.icon-opt.on{background:var(--blue-bg);border-color:var(--blue-txt);color:var(--blue-txt);font-weight:600;}
.detail-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:12px;cursor:pointer;transition:background .12s;}
.detail-row:hover{background:var(--fill2);}
.detail-row:last-child{border-bottom:none;}
.detail-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.detail-main{display:flex;align-items:center;gap:8px;min-width:0;}
.detail-name{font-size:14px;font-weight:500;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.detail-sub{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--label3);min-width:0;}
.detail-payer{white-space:nowrap;flex-shrink:0;}
.detail-sep{flex-shrink:0;}
.detail-members{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.detail-amt{font-size:15px;font-weight:700;flex-shrink:0;}
.pay-ic{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);color:var(--blue-txt);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.share-date-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:0;flex-wrap:nowrap;}@media(max-width:740px){.share-date-row{padding:0;}}
.share-date-inp{font-size:13px;padding:6px 10px;border:1px solid var(--sep2);border-radius:8px;background-color:var(--card);color:var(--label);font-family:inherit;outline:none;cursor:pointer;flex:1;min-width:0;}
.share-date-inp:hover{border-color:var(--label3);}
.share-date-inp:focus{border-color:var(--blue);}
.share-date-sep{color:var(--label3);font-size:13px;}
.share-date-add{font-size:12px;padding:6px 10px;border:1px dashed var(--sep2);border-radius:8px;background:transparent;color:var(--label2);cursor:pointer;font-family:inherit;}
.share-date-add:hover{border-color:var(--blue);color:var(--blue);}
.share-date-rm{width:24px;height:24px;border-radius:50%;border:none;background:var(--fill);color:var(--label3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.share-date-rm:hover{background:var(--red-bg);color:var(--red);}
.share-actions{margin-top:20px;}
.share-save-btn{width:100%;border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:600;background:var(--label);color:#fff;cursor:pointer;transition:opacity .12s;display:flex;align-items:center;justify-content:center;gap:8px;}
.share-save-btn:hover{opacity:.88;}
.share-save-btn:active{transform:scale(.99);}
.share-hist-btn{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;background:var(--fill);color:var(--label);cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.share-hist-btn:hover{background:var(--fill2);}
.notice{font-size:11px;color:var(--label3);text-align:center;margin-top:12px;line-height:1.6;}
.empty{text-align:center;padding:64px 20px;color:var(--label3);}
.empty-icon{margin-bottom:12px;display:flex;justify-content:center;color:var(--label3);}
.empty p{font-size:14px;line-height:1.7;}
.empty-sm{text-align:center;padding:24px 16px;color:var(--label3);font-size:13px;line-height:1.6;}

/* ── 기록 보관함 ── */
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
.hist-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--label3);padding:5px 10px;border:1px solid var(--sep);background:var(--fill2);border-radius:20px;white-space:nowrap;}
.hist-badge.connected{color:var(--green-txt);border-color:var(--green);background:var(--green-bg);}
.hist-badge.syncing{color:var(--blue-txt);border-color:var(--blue);background:var(--blue-bg);}
.hist-dbx-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--label2);padding:5px 10px;border:1px solid var(--sep);background:var(--fill2);border-radius:20px;cursor:pointer;white-space:nowrap;}
.hist-dbx-btn:hover{background:var(--fill);color:var(--label);}
.record-list{display:flex;flex-direction:column;gap:10px;}
.record-card{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;}
.rc-hd{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;transition:background .12s;}
.rc-hd:hover{background:var(--fill2);}
.rc-meta{flex:1;min-width:0;}
.rc-date{font-size:11px;color:var(--label3);margin-bottom:3px;}
.rc-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.rc-people{font-size:12px;color:var(--label2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.rc-total{font-size:18px;font-weight:700;white-space:nowrap;}
.rc-total.neg{color:var(--red);}
.rc-chevron{font-size:11px;color:var(--label3);transition:transform .2s;}
.rc-chevron.open{transform:rotate(180deg);}
.rc-body{border-top:1px solid var(--sep);display:none;}
.rc-body.open{display:block;}
.rc-section-title{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;padding:10px 16px 6px;}
.rc-item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--sep);gap:10px;}
.rc-item-row:last-child{border-bottom:none;}
.rc-item-info{flex:1;min-width:0;}
.rc-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-item-meta{font-size:11px;color:var(--label3);margin-top:1px;}
.rc-item-amt{font-size:13px;font-weight:600;flex-shrink:0;}
.rc-item-amt.neg{color:var(--red);}
.rc-txns{padding:0 0 4px;}
.rc-txn-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--sep);font-size:13px;}
.rc-txn-row:last-child{border-bottom:none;}
.rc-txn-people{display:flex;align-items:center;gap:6px;color:var(--label);}
.rc-txn-amt{font-weight:600;flex-shrink:0;}
.rc-no-txn{font-size:13px;color:var(--green);padding:10px 16px;text-align:center;}
.rc-foot{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;background:var(--fill2);border-top:1px solid var(--sep);}
.rc-saved-at{font-size:11px;color:var(--label3);}
.rc-del-btn{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;}
.rc-del-btn:hover{opacity:.7;}
.sync-info{font-size:12px;color:var(--label3);text-align:center;margin-top:14px;padding-bottom:4px;}
/* Dropbox panel */
.dbx-panel{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.dbx-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.dbx-panel-hd:hover{background:var(--fill2);}
.dbx-panel-title{font-size:13px;font-weight:600;color:var(--label);}
.dbx-panel-sub{font-size:12px;color:var(--label3);margin-top:1px;}
.dbx-chevron{color:var(--label3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.dbx-chevron.open{transform:rotate(180deg);}
.dbx-panel-body{padding:16px;border-top:1px solid var(--sep);}
.dbx-field{margin-bottom:14px;}
.dbx-label{font-size:11px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
.dbx-inp{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;font-family:inherit;}
.dbx-inp:focus{border-color:var(--blue);}
.dbx-guide{font-size:12px;color:var(--label3);line-height:1.65;margin-top:6px;}
.dbx-guide code{font-size:11px;background:var(--fill);padding:2px 5px;border-radius:4px;font-family:monospace;word-break:break-all;}
.dbx-btn{width:100%;border:none;border-radius:var(--rs);padding:11px;font-size:14px;font-weight:600;background:var(--label);color:#fff;cursor:pointer;transition:opacity .12s;font-family:inherit;}
.dbx-btn:hover{opacity:.88;}
.dbx-btn.secondary{background:var(--fill);color:var(--label);border:1px solid var(--sep2);}
.dbx-btn.secondary:hover{background:var(--fill2);}
.dbx-account{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--green-bg);border:1px solid var(--green);border-radius:var(--rs);margin-bottom:12px;}
.dbx-account-info{flex:1;min-width:0;}
.dbx-account-name{font-size:13px;font-weight:600;color:var(--green-txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-account-email{font-size:11px;color:var(--green-txt);opacity:.8;}
.dbx-disconnect{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;flex-shrink:0;cursor:pointer;font-family:inherit;}
.dbx-btn-row{display:flex;gap:8px;}
.dbx-btn-row .dbx-btn{flex:1;padding:9px;}
</style>
</head>
<body>

<!-- DESKTOP -->
<div class="desktop-shell">
<div class="desktop-app">
  <div class="left" id="dLeft">
    <div class="left-top">
      <div class="app-label">Dutch Pay <span class="app-version" id="appVersionD"></span></div>
      <div class="app-title">더치페이</div>
      <div style="margin-bottom:16px;display:flex;gap:6px;align-items:center;justify-content:flex-end">
        <button class="data-menu-btn" onclick="showDataMenu(this,event)"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg></button>
      </div>
      <div class="tab-row">
        <button class="tab on" id="dTInput" onclick="dSetTab('input')">입력</button>
        <button class="tab" id="dTResult" onclick="dSetTab('result')">내역</button>
        <button class="tab" id="dTSettle" onclick="dSetTab('settle')">공유</button>
        <button class="tab" id="dTHistory" onclick="dSetTab('history')" style="display:none">기록</button>
      </div>
      <div style="margin-bottom:14px;">
        <input type="date" id="meetingDateInp" style="width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:8px 10px;font-size:13px;background-color:var(--card);color:var(--label);outline:none;cursor:pointer;font-family:inherit;" onclick="try{this.showPicker()}catch(e){}" onchange="updateMeetingDate(this.value)"/>
      </div>
      <div class="people-wrap">
        <div class="sec-label-row">
          <span class="sec-label">참여자</span>
          <button class="clear-all-btn" onclick="clearAll()">전체 삭제</button>
        </div>
        <div class="pin-row">
          <input id="dPInp" placeholder="홍길동, 홍길순, 아무개"/>
          <button class="pin-btn" onclick="dFlush()">추가</button>
        </div>
        <div class="pin-hint">쉼표(,)로 구분하면 여러 명을 한 번에 추가할 수 있어요</div>
        <div class="pills" id="dPills"><span class="pills-empty">이름을 입력하세요</span></div>
      </div>
    </div>
    <div class="items-scroll">
      <div class="ilist-label-row">
        <span class="ilist-label">지출</span>
        <button class="clear-all-btn" onclick="clearAllItems()">전체 삭제</button>
      </div>
      <div class="ilist-label-row" id="dItemTools" style="display:none">
        <input type="search" class="ilist-search" id="dItemSearch" placeholder="검색" oninput="setItemSearch(this.value)"/>
        <select class="ilist-sort" onchange="setItemSort(this.value)" id="dItemSort">
          <option value="default">기본순</option>
          <option value="amtDesc">금액↓</option>
          <option value="amtAsc">금액↑</option>
          <option value="nameAsc">이름순</option>
        </select>
      </div>
      <div id="dItemRows"></div>
      <div class="add-row" onclick="addItem()">
        <div class="add-ic">+</div>
        <span class="add-txt">지출 추가</span>
      </div>
    </div>
    <div class="left-foot">
      <div class="foot-row">
        <span class="foot-lbl">합계</span>
        <span class="foot-val" id="dTotal">0원</span>
      </div>
      <div id="dbxSyncBadge" style="font-size:11px;color:var(--label3);text-align:right;margin-top:5px;min-height:14px"></div>
    </div>
  </div>
  <div class="right">
    <div class="right-top">
      <div class="r-eye" id="dREye">시작하기</div>
      <div class="r-title" id="dRTitle">참여자와 지출을 추가해보세요</div>
      <div class="r-sub" id="dRSub">왼쪽에서 참여자를 입력하고 지출을 추가하면 정산을 시작할 수 있어요.</div>
    </div>
    <div class="right-body" id="dRBody">
      <div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="11" y2="16"/></svg></div><p>지출을 선택하거나 추가하면<br>여기서 편집할 수 있어요</p></div>
    </div>
  </div>
</div>
</div>

<!-- MOBILE -->
<div class="mobile-shell">
  <div class="mob-header">
    <div class="mob-title-row">
      <span class="mob-title">더치페이<span class="app-version" id="appVersionM" style="font-size:11px;color:var(--label3);margin-left:6px;font-weight:400"></span></span>
      <span id="mTotal" style="font-size:18px;font-weight:700">0원</span>
    </div>
    <div style="margin-bottom:14px;display:flex;gap:6px;align-items:center;justify-content:flex-end">
      <button class="data-menu-btn" onclick="showDataMenu(this,event)"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg></button>
    </div>
    <div class="mob-tabs">
      <button class="mob-tab on" id="mTInput" onclick="mSetTab('input')">입력</button>
      <button class="mob-tab" id="mTResult" onclick="mSetTab('result')">내역</button>
      <button class="mob-tab" id="mTSettle" onclick="mSetTab('settle')">공유</button>
      <button class="mob-tab" id="mTHistory" onclick="mSetTab('history')" style="display:none">기록</button>
    </div>
  </div>
  <div class="mob-body" id="mBody"></div>
  <div class="mob-sheet-overlay" id="mOverlay" onclick="closeSheet()"></div>
  <div class="mob-sheet" id="mSheet">
    <div class="mob-sheet-handle"></div>
    <div class="mob-sheet-title" id="mSheetTitle">지출 편집</div>
    <div class="mob-sheet-body" id="mSheetBody"></div>
  </div>
</div>

<script>
const APP_VERSION='v1.22';
const BUILD_TIME='2026-06-03 16:00';
window.diag=()=>{const r={version:APP_VERSION,build:BUILD_TIME,groupCards:document.querySelectorAll('.group-card').length,groupActs:document.querySelectorAll('.group-card-acts').length,sw:navigator.serviceWorker.controller?.scriptURL?.split('/').pop()||'none'};console.table(r);caches.keys().then(k=>console.log('caches:',k));return r;};

let people=[],items=[],idc=0,selectedId=null;
let dTab='input',mTab='input';
let itemSort='default',itemSearch='';
let settleDateStart=new Date().toISOString().slice(0,10),settleDateEnd=null;
let groups=[],currentGroupId=null;

function _emptyGroupData(){return{people:[],items:[],idc:0,settleDateStart:new Date().toISOString().slice(0,10),settleDateEnd:null,itemSort:'default',itemSearch:''};}
function _autoGroupName(p){return(!p||!p.length)?'모임명 또는 참여자':p.join(', ');}
function _updateAutoNameIfNeeded(){const g=getCurrentGroup();if(!g||!g.nameAuto)return;g.name=_autoGroupName(people);}
function _newGroupId(){return 'g'+Date.now()+Math.floor(Math.random()*1000);}
function getCurrentGroup(){return groups.find(g=>g.id===currentGroupId);}
function syncCurrentToGroup(){const g=getCurrentGroup();if(!g)return;g.data={people:people.slice(),items:JSON.parse(JSON.stringify(items)),idc,settleDateStart,settleDateEnd,itemSort,itemSearch};}
function loadGroupData(g){people=(g.data.people||[]).slice();items=JSON.parse(JSON.stringify(g.data.items||[]));idc=g.data.idc||0;settleDateStart=g.data.settleDateStart||new Date().toISOString().slice(0,10);settleDateEnd=g.data.settleDateEnd!==undefined?g.data.settleDateEnd:null;itemSort=g.data.itemSort||'default';itemSearch=g.data.itemSearch||'';selectedId=null;}
function switchGroup(id){if(id===currentGroupId)return;syncCurrentToGroup();currentGroupId=id;const g=getCurrentGroup();if(g)loadGroupData(g);renderAll();}
function createGroup(name){const id=_newGroupId();syncCurrentToGroup();const trimmed=(name||'').trim();const isAuto=!trimmed;groups.push({id,name:trimmed||_autoGroupName([]),nameAuto:isAuto,data:_emptyGroupData()});currentGroupId=id;loadGroupData(groups[groups.length-1]);renderAll();toast(trimmed?`'${trimmed}' 그룹 생성됨`:'새 그룹이 생성됐어요',{type:'success'});}
function renameGroup(id,newName){const g=groups.find(g=>g.id===id);if(!g)return;const trimmed=(newName||'').trim();if(!trimmed)return;g.name=trimmed;g.nameAuto=false;saveState();renderAll();}
function duplicateGroup(id){const g=groups.find(g=>g.id===id);if(!g)return;syncCurrentToGroup();const newId=_newGroupId();const ng={id:newId,name:g.name+' (복사)',nameAuto:false,data:{people:(g.data.people||[]).slice(),items:[],idc:0,settleDateStart:new Date().toISOString().slice(0,10),settleDateEnd:null,itemSort:'default',itemSearch:''}};groups.push(ng);currentGroupId=newId;loadGroupData(ng);renderAll();toast(`'${ng.name}' 생성됨`,{type:'success'});}
function deleteGroup(id){if(groups.length<=1){toast('마지막 그룹은 삭제할 수 없어요',{type:'error'});return;}const idx=groups.findIndex(g=>g.id===id);if(idx<0)return;const snap={group:JSON.parse(JSON.stringify(groups[idx])),idx,wasCurrent:id===currentGroupId};groups.splice(idx,1);if(snap.wasCurrent){currentGroupId=groups[0].id;loadGroupData(groups[0]);}renderAll();toast(`'${snap.group.name}' 그룹 삭제됨`,{action:()=>{groups.splice(snap.idx,0,snap.group);if(snap.wasCurrent){syncCurrentToGroup();currentGroupId=snap.group.id;loadGroupData(snap.group);}renderAll();},actionLabel:'되돌리기'});}

function _groupSummary(g){const isCurrent=g.id===currentGroupId;const data=isCurrent?{people,items,settleDateStart,settleDateEnd}:g.data||{};const peopleArr=data.people||[];const itemsArr=data.items||[];const total=itemsArr.reduce((s,it)=>s+(+it.amount||0),0);let dateText='';if(data.settleDateStart){const fmtD=(iso)=>iso?iso.slice(5).replace('-','.'):'';if(data.settleDateEnd&&data.settleDateEnd!==data.settleDateStart){dateText=fmtD(data.settleDateStart)+'~'+fmtD(data.settleDateEnd);}else{dateText=data.settleDateStart.slice(2).replace(/-/g,'.');}}return{total,totalText:total?fmt(total)+'원':'—',peopleText:peopleArr.length?peopleArr.join(' · '):'참여자 없음',peopleCount:peopleArr.length,dateText};}

  const cardsHtml=groups.map(g=>{const s=_groupSummary(g);const on=g.id===currentGroupId;return `<div class="group-card${on?' on':''}"><button class="group-card-main" data-action="switch" data-id="${e(g.id)}"><span class="group-card-dot"></span><span class="group-card-info"><span class="group-card-name">${e(g.name)}</span><span class="group-card-meta"><span class="group-card-people">${e(s.peopleText)}</span>${s.dateText?`<span class="group-card-date">${e(s.dateText)}</span>`:''}</span></span><span class="group-card-amt">${s.totalText}</span></button><button class="group-card-more" data-action="more" data-id="${e(g.id)}" aria-label="더보기">⋯</button></div>`;}).join('');

}

function _positionPopover(pop,anchorEl,rightAlign){const r=anchorEl.getBoundingClientRect();pop.style.top=(r.bottom+window.scrollY+6)+'px';const isMobile=window.innerWidth<700;if(isMobile){pop.style.left='12px';pop.style.right='12px';pop.style.width='auto';pop.style.maxWidth='none';}else{pop.style.right='auto';pop.style.width='auto';const pr=pop.getBoundingClientRect();let left=rightAlign?r.right-pr.width+window.scrollX:r.left+window.scrollX;if(left+pr.width>window.innerWidth-8)left=window.innerWidth-pr.width-8;pop.style.left=Math.max(8,left)+'px';}}

function _openGroupMorePop(anchorBtn,id,parentPop){document.querySelectorAll('.group-more-pop').forEach(el=>el.remove());const g=groups.find(x=>x.id===id);if(!g)return;const canDelete=groups.length>1;const menu=document.createElement('div');menu.className='group-more-pop';menu.innerHTML=`<button class="group-more-opt" data-mact="duplicate">${svgCopy}<span>복사</span></button><button class="group-more-opt" data-mact="rename">${svgPencil}<span>이름 변경</span></button>${canDelete?`<button class="group-more-opt danger" data-mact="delete">${svgTrash}<span>삭제</span></button>`:''}`;document.body.appendChild(menu);const r=anchorBtn.getBoundingClientRect();const mr=menu.getBoundingClientRect();let top=r.bottom+4;if(top+mr.height>window.innerHeight-8)top=r.top-mr.height-4;let left=r.right-mr.width;if(left<8)left=8;menu.style.top=top+'px';menu.style.left=left+'px';menu.addEventListener('click',(e2)=>{e2.stopPropagation();const b=e2.target.closest('[data-mact]');if(!b)return;const mact=b.dataset.mact;menu.remove();if(parentPop&&parentPop.remove)parentPop.remove();if(mact==='duplicate'){duplicateGroup(id);}else if(mact==='rename'){const newName=prompt('새 이름:',g.name);if(newName&&newName.trim())renameGroup(id,newName);}else if(mact==='delete'){if(confirm(`'${g.name}' 그룹을 삭제할까요?`))deleteGroup(id);}});setTimeout(()=>{const close=(ev)=>{if(!menu.contains(ev.target)){menu.remove();document.removeEventListener('click',close);document.removeEventListener('keydown',esc);}};const esc=(ev)=>{if(ev.key==='Escape'){menu.remove();document.removeEventListener('click',close);document.removeEventListener('keydown',esc);}};document.addEventListener('click',close);document.addEventListener('keydown',esc);},0);}

function refreshGroupSwitcher(){const g=getCurrentGroup();const name=g?g.name:'모임명 또는 참여자';document.querySelectorAll('.group-switcher-name').forEach(el=>{el.textContent=name;});}

function exportData(){syncCurrentToGroup();const payload={version:2,exportedAt:new Date().toISOString(),groups,currentGroupId};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=`더치페이_백업_${new Date().toISOString().slice(0,10)}.json`;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);toast('백업 파일이 다운로드됐어요',{type:'success'});}

function exportCurrentGroupCsv(){const g=getCurrentGroup();if(!g){toast('내보낼 데이터가 없어요',{type:'error'});return;}syncCurrentToGroup();if(!items.length){toast('지출이 없는 그룹이에요',{type:'error'});return;}const BOM='﻿';const esc=(s)=>{s=String(s==null?'':s);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};const lines=[];lines.push(`그룹,${esc(g.name)}`);if(settleDateStart){if(settleDateEnd&&settleDateEnd!==settleDateStart){lines.push(`기간,${settleDateStart} ~ ${settleDateEnd}`);}else{lines.push(`일자,${settleDateStart}`);}}const total=items.reduce((s,it)=>s+(+it.amount||0),0);lines.push(`총 금액,${total}`);lines.push(`참여자,${esc(people.join(', '))}`);lines.push('');lines.push('# 지출 내역');lines.push('번호,지출 이름,금액,결제자,참여자');items.forEach((it,i)=>{const mems=(it.members.length?it.members:people).join(', ');lines.push([i+1,esc(it.name||'(이름 없음)'),+it.amount||0,esc(it.payer||''),esc(mems)].join(','));});lines.push('');const{paid,owes}=computeShares();const txns=calcTxns(paid,owes);if(txns.length){lines.push('# 송금 내역');lines.push('보내는 사람,받는 사람,금액');txns.forEach(t=>{lines.push([esc(t.from),esc(t.to),t.amt].join(','));});lines.push('');}lines.push('# 개인별 정산');lines.push('이름,결제 총액,분담 총액,순액');people.forEach(p=>{const paidP=paid[p]||0,owesP=owes[p]||0,net=paidP-owesP;lines.push([esc(p),paidP,owesP,net].join(','));});const csv=BOM+lines.join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const safeName=g.name.replace(/[\\\/:*?"<>|]/g,'_');a.download=`더치페이_${safeName}_${new Date().toISOString().slice(0,10)}.csv`;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);toast('엑셀(CSV) 파일이 다운로드됐어요',{type:'success'});}

function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';inp.onchange=()=>{const file=inp.files&&inp.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const d=JSON.parse(reader.result);if(!d||!Array.isArray(d.groups)||!d.groups.length){toast('올바른 백업 파일이 아니에요',{type:'error'});return;}if(!confirm(`백업의 ${d.groups.length}개 그룹을 현재 데이터에 추가할까요?`))return;const existingIds=new Set(groups.map(g=>g.id));let added=0;d.groups.forEach(g=>{let newId=g.id;while(existingIds.has(newId))newId=_newGroupId();existingIds.add(newId);groups.push({id:newId,name:g.name||'복원된 그룹',data:Object.assign(_emptyGroupData(),g.data||{})});added++;});saveState();renderAll();toast(`${added}개 그룹 가져오기 완료`,{type:'success'});}catch(e){toast('백업 파일을 읽을 수 없어요',{type:'error'});}};reader.readAsText(file);};inp.click();}

function getDisplayItems(){let arr=items.slice();if(itemSearch.trim()){const q=itemSearch.trim().toLowerCase();arr=arr.filter(it=>(it.name||'').toLowerCase().includes(q));}if(itemSort==='amtDesc')arr.sort((a,b)=>(+b.amount||0)-(+a.amount||0));else if(itemSort==='amtAsc')arr.sort((a,b)=>(+a.amount||0)-(+b.amount||0));else if(itemSort==='nameAsc')arr.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));return arr;}

let _toastContainer=null;
function _getToastContainer(){if(!_toastContainer||!document.body.contains(_toastContainer)){_toastContainer=document.createElement('div');_toastContainer.className='toast-container';document.body.appendChild(_toastContainer);}return _toastContainer;}
function toast(msg,opts){opts=opts||{};const container=_getToastContainer();const t=document.createElement('div');t.className='toast'+(opts.type?' '+opts.type:'');const span=document.createElement('span');span.className='toast-msg';span.textContent=msg;t.appendChild(span);let timer=null;const dismiss=()=>{if(timer){clearTimeout(timer);timer=null;}t.classList.remove('show');setTimeout(()=>{if(t.parentNode)t.remove();},250);};if(opts.action&&opts.actionLabel){const btn=document.createElement('button');btn.type='button';btn.className='toast-action';btn.textContent=opts.actionLabel;btn.addEventListener('click',()=>{opts.action();dismiss();});t.appendChild(btn);}container.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));const duration=opts.duration||(opts.action?5000:2500);timer=setTimeout(dismiss,duration);return{dismiss};}

function detectInAppBrowser(){const ua=navigator.userAgent||'';if(/KAKAOTALK/i.test(ua))return{name:'카카오톡',scheme:'kakaotalk://web/openExternal?url='};if(/NAVER\(inapp/i.test(ua))return{name:'네이버',scheme:null};if(/Line\//i.test(ua))return{name:'Line',scheme:'line://nv/openExternalBrowser/?url='};if(/Instagram/i.test(ua))return{name:'Instagram',scheme:null};if(/FBAN|FBAV/i.test(ua))return{name:'Facebook',scheme:null};return null;}

const STORAGE_KEY='dutchpay_v1';
const HISTORY_KEY='dutchpay_history';

// ── Dropbox 자동 동기화 ──
const DBX_MAIN_FILE='/01_Personal/Dutch-Pay/dutch-pay_data.json';
const DBX_LASTSYNC_MAIN='dutchpay_dbx_lastsync_main';
// history.html과 동일한 localStorage 키 공유 (같은 도메인 = 같은 계정)
function dbxGetToken(){return localStorage.getItem('dutchpay_dbx_token');}
async function _dbxRefreshToken(){
  const refresh=localStorage.getItem('dutchpay_dbx_refresh');
  const appKey=localStorage.getItem('dutchpay_dbx_appkey');
  if(!refresh||!appKey)return null;
  try{const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:refresh,client_id:appKey})});const data=await res.json();if(data.access_token){localStorage.setItem('dutchpay_dbx_token',data.access_token);return data.access_token;}return null;}catch(e){return null;}
}
async function _dbxUpload(token,path,content){
  const res=await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify({path,mode:'overwrite',autorename:false,mute:true})},body:content});
  if(res.status===401){const t=await _dbxRefreshToken();if(t)return _dbxUpload(t,path,content);}
  return res.ok;
}
async function _dbxDownload(token,path){
  const res=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Dropbox-API-Arg':JSON.stringify({path})}});
  if(res.status===409)return null;if(res.status===401){const t=await _dbxRefreshToken();if(t)return _dbxDownload(t,path);return null;}if(!res.ok)return null;
  try{return JSON.parse(await res.text());}catch(e){return null;}
}
let _syncTimer=null,_syncing=false;
function _scheduleSyncToDropbox(){
  if(!dbxGetToken())return;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>syncToDropbox(),3000);
}
async function syncToDropbox(){
  if(_syncing||!dbxGetToken())return;
  _syncing=true;
  try{
    syncCurrentToGroup();
    const ok=await _dbxUpload(dbxGetToken(),DBX_MAIN_FILE,JSON.stringify({version:2,groups,currentGroupId,syncedAt:new Date().toISOString()}));
    if(ok){localStorage.setItem(DBX_LASTSYNC_MAIN,new Date().toISOString());_updateSyncBadge();}
  }catch(e){}finally{_syncing=false;}
}
async function syncFromDropbox(){
  const token=dbxGetToken();if(!token)return;
  try{
    const remote=await _dbxDownload(token,DBX_MAIN_FILE);
    if(!remote||!Array.isArray(remote.groups)||!remote.groups.length){await syncToDropbox();return;}
    // last-write-wins: remote가 더 최신이면 통째로 교체 (삭제도 정상 반영)
    const localLast=localStorage.getItem(DBX_LASTSYNC_MAIN)||'';
    const remoteAt=remote.syncedAt||'';
    if(remoteAt && remoteAt > localLast){
      groups=remote.groups;
      currentGroupId=remote.currentGroupId||groups[0].id;
      const g=getCurrentGroup()||groups[0];currentGroupId=g.id;loadGroupData(g);
      localStorage.setItem(STORAGE_KEY,JSON.stringify({version:2,groups,currentGroupId}));
      localStorage.setItem(DBX_LASTSYNC_MAIN,remoteAt);
      _updateSyncBadge();renderAll();
      toast('Dropbox에서 최신 데이터를 불러왔어요',{type:'success'});
      return;
    }
    // 로컬이 더 최신이거나 동일 → 업로드
    await syncToDropbox();
  }catch(e){}
}
function _updateSyncBadge(){
  const el=document.getElementById('dbxSyncBadge');if(!el)return;
  const last=localStorage.getItem(DBX_LASTSYNC_MAIN);
  if(!last||!dbxGetToken()){el.textContent='';return;}
  try{const d=new Date(last);el.textContent=`☁ ${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 동기화됨`;}catch(e){}
}

function saveState(){try{syncCurrentToGroup();localStorage.setItem(STORAGE_KEY,JSON.stringify({version:2,groups,currentGroupId}));_scheduleSyncToDropbox();}catch(e){}}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw){const id=_newGroupId();groups=[{id,name:'모임명 또는 참여자',nameAuto:true,data:_emptyGroupData()}];currentGroupId=id;loadGroupData(groups[0]);return;}const d=JSON.parse(raw);if(d.version===2&&Array.isArray(d.groups)&&d.groups.length){groups=d.groups;currentGroupId=d.currentGroupId||groups[0].id;const g=getCurrentGroup()||groups[0];currentGroupId=g.id;loadGroupData(g);}else{const id=_newGroupId();const v1People=Array.isArray(d.people)?d.people:[];groups=[{id,name:v1People.length?_autoGroupName(v1People):'모임명 또는 참여자',nameAuto:true,data:{people:v1People,items:Array.isArray(d.items)?d.items:[],idc:typeof d.idc==='number'?d.idc:0,settleDateStart:d.settleDateStart||new Date().toISOString().slice(0,10),settleDateEnd:d.settleDateEnd!==undefined?d.settleDateEnd:null,itemSort:'default',itemSearch:''}}];currentGroupId=id;loadGroupData(groups[0]);}}catch(e){const id=_newGroupId();groups=[{id,name:'모임명 또는 참여자',nameAuto:true,data:_emptyGroupData()}];currentGroupId=id;loadGroupData(groups[0]);}}

function getIconSvg(itemOrName){let name,override;if(typeof itemOrName==='string'){name=itemOrName;}else if(itemOrName){name=itemOrName.name;override=itemOrName.iconOverride;}if(override&&ICON_BY_KEY[override])return ICON_BY_KEY[override];if(!name||!name.trim())return svgReceipt;for(const[svg,pat]of ICON_RULES){if(pat.test(name))return svg;}return svgFood;}

function addOneName(raw){const n=raw.trim();if(!n||people.includes(n))return;people.push(n);_updateAutoNameIfNeeded();renderAll();}

function removePerson(name){const idx=people.indexOf(name);if(idx<0)return;const snap={name,idx,items:items.map(it=>({id:it.id,members:[...it.members],payer:it.payer,rounderOverride:it.rounderOverride}))};people=people.filter(p=>p!==name);items.forEach(it=>{it.members=it.members.filter(m=>m!==name);if(it.payer===name)it.payer=people[0]||'';if(it.rounderOverride===name)it.rounderOverride=null;});_updateAutoNameIfNeeded();renderAll();toast(`'${name}' 삭제됨`,{action:()=>{people.splice(snap.idx,0,snap.name);snap.items.forEach(s=>{const it=items.find(i=>i.id===s.id);if(it){it.members=s.members;it.payer=s.payer;it.rounderOverride=s.rounderOverride;}});_updateAutoNameIfNeeded();renderAll();},actionLabel:'되돌리기'});}

function updateField(id,field,val){const it=items.find(i=>i.id===id);if(!it)return;it[field]=val;renderItemLists();refreshMobItems();updateTotals();if(field==='name'){document.getElementById('dREye').textContent='지출 편집';document.getElementById('dRTitle').textContent=val||'새 지출';const mst=document.getElementById('mSheetTitle');if(mst)mst.textContent=val||'새 지출';}saveState();}

function toggleMember(id,name,btn){const it=items.find(i=>i.id===id);if(!it)return;if(it.members.includes(name)){if(it.members.length>1)it.members=it.members.filter(m=>m!==name);}else it.members.push(name);btn.className='chip'+(it.members.includes(name)?' on':'');renderItemLists();refreshMobItems();saveState();}

function computeShares(){
  const paid={},owes={},details={},owesFloat={};
  people.forEach(p=>{paid[p]=0;owes[p]=0;details[p]=[];owesFloat[p]=0;});
  const payerSet={};
  items.forEach(it=>{
    if(!it.amount||+it.amount===0)return;
    const amt=+it.amount,mems=it.members.length?it.members:[...people],n=mems.length;
    paid[it.payer]=(paid[it.payer]||0)+amt;
    if(it.payer)payerSet[it.payer]=true;
    const override=it.rounderOverride;
    if(override&&mems.includes(override)){
      const base=Math.floor(amt/n),rem=amt-base*n;
      mems.forEach(p=>{const share=p===override?base+rem:base;owesFloat[p]=(owesFloat[p]||0)+share;details[p].push({name:it.name||'(이름 없음)',payer:it.payer,share,extra:p===override&&rem>0});});
    }else{
      const exact=amt/n;
      mems.forEach(p=>{owesFloat[p]=(owesFloat[p]||0)+exact;details[p].push({name:it.name||'(이름 없음)',payer:it.payer,share:exact,extra:false});});
    }
  });
  const totalAmt=items.reduce((s,it)=>s+(+it.amount||0),0);
  let totalFloor=0;const fracParts=[];
  people.forEach(p=>{const f=owesFloat[p]||0;const fl=Math.floor(f);owes[p]=fl;totalFloor+=fl;fracParts.push({p,frac:f-fl});});
  let diff=Math.round(totalAmt-totalFloor);
  if(diff!==0){fracParts.sort((a,b)=>{const ap=payerSet[a.p]?1:0,bp=payerSet[b.p]?1:0;if(ap!==bp)return bp-ap;return b.frac-a.frac;});if(fracParts.length)owes[fracParts[0].p]+=diff;}
  return{paid,owes,details,hasRounding:diff!==0};
}

function calcTxns(paid,owes){
  const bal={};people.forEach(p=>{bal[p]=(paid[p]||0)-(owes[p]||0);});
  const creds=[],debts=[];
  Object.entries(bal).forEach(([p,b])=>{if(b>0.5)creds.push({p,b});else if(b<-0.5)debts.push({p,b:-b});});
  creds.sort((a,z)=>z.b-a.b);debts.sort((a,z)=>z.b-a.b);
  const txns=[],cs=creds.map(c=>({...c})),ds=debts.map(d=>({...d}));
  let ci=0,di=0;
  while(ci<cs.length&&di<ds.length){const c=cs[ci],d=ds[di],amt=Math.min(c.b,d.b);if(amt>0.5)txns.push({from:d.p,to:c.p,amt:Math.round(amt)});c.b-=amt;d.b-=amt;if(c.b<0.5)ci++;if(d.b<0.5)di++;}
  return txns;
}

function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/"/g,'&quot;');}
function ja(s){return JSON.stringify(String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtAmt(v){if(v===''||v===null||v===undefined)return '';const n=+v;return isNaN(n)||n===0?'':n.toLocaleString('ko-KR');}

function handleAmtKeydown(e){if(['Backspace','Delete','Tab','Escape','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key))return;if((e.ctrlKey||e.metaKey)&&['a','c','v','x','z'].includes(e.key.toLowerCase()))return;if(/^\d$/.test(e.key))return;if(e.key==='-'){const el=e.target,start=el.selectionStart;if(start===0&&!el.value.startsWith('-'))return;}e.preventDefault();}

function handleAmtInput(id,el){const posFromEnd=el.value.length-el.selectionStart;const sign=el.value.trim().startsWith('-')?-1:1;const raw=el.value.replace(/[^0-9]/g,'');let num='';if(raw!==''){num=parseInt(raw,10)*sign;}el.value=num===''?'':(num<0?'-'+Math.abs(num).toLocaleString('ko-KR'):num.toLocaleString('ko-KR'));const newPos=Math.max(0,el.value.length-posFromEnd);el.setSelectionRange(newPos,newPos);updateField(id,'amount',num);}

async function hDbxConnect(){
  const appKey=(document.getElementById('hDbxAppKey')?.value||'').trim();
  if(!appKey){toast('App Key를 입력해주세요',{type:'error'});return;}
  localStorage.setItem(DBX_H_APPKEY,appKey);
  const verifier=_hRandomStr(64);
  const challenge=await _hSha256b64url(verifier);
  sessionStorage.setItem('h_dbx_verifier',verifier);
  const redirectUri=location.origin+location.pathname;
  const params=new URLSearchParams({client_id:appKey,redirect_uri:redirectUri,response_type:'code',code_challenge:challenge,code_challenge_method:'S256',token_access_type:'offline'});
  location.href=`https://www.dropbox.com/oauth2/authorize?${params}`;
}

async function hDbxHandleCallback(){
  const params=new URLSearchParams(location.search);
  const code=params.get('code');
  if(!code)return;
  history.replaceState({},'',location.pathname);
  const verifier=sessionStorage.getItem('h_dbx_verifier');
  if(!verifier)return;
  sessionStorage.removeItem('h_dbx_verifier');
  const appKey=localStorage.getItem(DBX_H_APPKEY);
  const redirectUri=location.origin+location.pathname;
  try{
    const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({code,grant_type:'authorization_code',client_id:appKey,redirect_uri:redirectUri,code_verifier:verifier})});
    const data=await res.json();
    if(data.error)throw new Error(data.error_description||data.error);
    localStorage.setItem(DBX_H_TOKEN,data.access_token);
    if(data.refresh_token)localStorage.setItem(DBX_H_REFRESH,data.refresh_token);
    try{const acRes=await fetch('https://api.dropboxapi.com/2/users/get_current_account',{method:'POST',headers:{Authorization:`Bearer ${data.access_token}`}});const ac=await acRes.json();localStorage.setItem(DBX_H_ACCOUNT,JSON.stringify({name:ac.name?.display_name||'',email:ac.email||''}));}catch(e2){}
    toast('Dropbox 연결됐어요!',{type:'success'});
    goToHistory();
  }catch(err){toast('연결 실패: '+err.message,{type:'error'});}
}

async function _hDbxRefreshToken(){
  const refresh=localStorage.getItem(DBX_H_REFRESH);const appKey=localStorage.getItem(DBX_H_APPKEY);
  if(!refresh||!appKey)return null;
  try{const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:refresh,client_id:appKey})});const data=await res.json();if(data.access_token){localStorage.setItem(DBX_H_TOKEN,data.access_token);return data.access_token;}return null;}catch(e){return null;}
}

function hDbxDisconnect(){
  if(!confirm('Dropbox 연결을 해제할까요?'))return;
  [DBX_H_TOKEN,DBX_H_REFRESH,DBX_H_ACCOUNT,DBX_H_LASTSYNC].forEach(k=>localStorage.removeItem(k));
  toast('Dropbox 연결 해제됨');
  if(dTab==='history')renderHistoryView('dREye','dRTitle','dRSub','dRBody');
  if(mTab==='history'){const el=document.getElementById('mBody');if(el)renderHistoryBody(el);}
}

let _hSyncing=false;
async function hSyncDropbox(uploadOnly=false){
  const token=hDbxGetToken();if(!token)return;
  if(_hSyncing)return;_hSyncing=true;
  const badge=document.getElementById('hDbxBadge');if(badge){badge.className='hist-badge syncing';badge.textContent='동기화 중...';}
  try{
    const local=loadHistory();
    if(!uploadOnly){
      const res=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Dropbox-API-Arg':JSON.stringify({path:DBX_H_FILE})}});
      if(res.ok){
        const remote=JSON.parse(await res.text());
        if(Array.isArray(remote)){
          const map=new Map();[...remote,...local].forEach(r=>{const ex=map.get(r.id);if(!ex||(r.savedAt||'')>(ex.savedAt||''))map.set(r.id,r);});
          const merged=Array.from(map.values()).sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
          saveHistory(merged);
        }
      }
    }
    const toUpload=loadHistory();
    let uploadToken=hDbxGetToken();
    const uploadRes=await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':`Bearer ${uploadToken}`,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify({path:DBX_H_FILE,mode:'overwrite',autorename:false,mute:true})},body:JSON.stringify(toUpload,null,2)});
    if(uploadRes.status===401){uploadToken=await _hDbxRefreshToken();if(uploadToken)await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':`Bearer ${uploadToken}`,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify({path:DBX_H_FILE,mode:'overwrite',autorename:false,mute:true})},body:JSON.stringify(toUpload,null,2)});}
    localStorage.setItem(DBX_H_LASTSYNC,new Date().toISOString());
    if(dTab==='history')renderHistoryView('dREye','dRTitle','dRSub','dRBody');
    if(mTab==='history'){const el=document.getElementById('mBody');if(el)renderHistoryBody(el);}
  }catch(err){toast('동기화 실패: '+err.message,{type:'error'});_updateHDbxBadge();}
  finally{_hSyncing=false;}
}

async function _hSha256b64url(str){const data=new TextEncoder().encode(str);const hash=await crypto.subtle.digest('SHA-256',data);return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function _hRandomStr(len){const arr=new Uint8Array(len);crypto.getRandomValues(arr);return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'').slice(0,len);}

// ── 이미지 공유 ──
function roundRectPath(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

const iconImgCache=new Map();
async function loadIconImage(svgStr,color){const key=svgStr+'|'+color;if(iconImgCache.has(key))return iconImgCache.get(key);const colored=svgStr.replace(/currentColor/g,color);const withNs=colored.includes('xmlns')?colored:colored.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"');const blob=new Blob([withNs],{type:'image/svg+xml;charset=utf-8'});const url=URL.createObjectURL(blob);try{const img=new Image();await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});iconImgCache.set(key,img);return img;}finally{setTimeout(()=>URL.revokeObjectURL(url),1000);}}

function formatShareDate(startDate,endDate){
  const fmtDate=(iso)=>{
    if(!iso)return '';
    return iso.replaceAll('-','.');
  };

  if(!startDate)return '';
  if(!endDate||startDate===endDate)return fmtDate(startDate);
  return `${fmtDate(startDate)} - ${fmtDate(endDate)}`;
}

function truncateCanvasText(ctx,text,maxWidth){
  const raw=String(text||'');
  if(maxWidth<=0)return '';
  if(ctx.measureText(raw).width<=maxWidth)return raw;
  const ellipsis='…';
  if(ctx.measureText(ellipsis).width>maxWidth)return '';
  let lo=0,hi=raw.length,best=ellipsis;
  while(lo<=hi){
    const mid=Math.floor((lo+hi)/2);
    const next=raw.slice(0,mid)+ellipsis;
    if(ctx.measureText(next).width<=maxWidth){best=next;lo=mid+1;}
    else hi=mid-1;
  }
  return best;
}

async function generateSettleCanvas(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);
  const{paid,owes}=computeShares();
  const txns=calcTxns(paid,owes);
  const validItems=items.filter(it=>+it.amount!==0);
  const hasRounding=validItems.some(it=>{
    const n=(it.members.length||people.length)||1;
    return Math.abs(Math.round((+it.amount||0)%n))>0;
  });
  const iconMap=new Map();for(const it of validItems){const svg=getIconSvg(it);if(!iconMap.has(svg)){try{iconMap.set(svg,await loadIconImage(svg,'#0055B8'));}catch(e){iconMap.set(svg,null);}}}
  const W=1080,PAD=42,TOP_PAD=56,cardX=PAD,cardW=W-PAD*2;
  const HEADER_H=118,SECTION_LABEL_H=58,SECTION_GAP=56,TOTAL_CARD_H=245,TXN_ROW_H=108,ITEM_ROW_H=152,EMPTY_CARD_H=132,BOTTOM_PAD=60,NOTICE_H=78;
  const txnCardH=txns.length?txns.length*TXN_ROW_H:EMPTY_CARD_H;
  const itemCardH=validItems.length?validItems.length*ITEM_ROW_H:EMPTY_CARD_H;
  const H=TOP_PAD+HEADER_H+SECTION_LABEL_H+TOTAL_CARD_H+SECTION_GAP+SECTION_LABEL_H+txnCardH+SECTION_GAP+SECTION_LABEL_H+itemCardH+(hasRounding?NOTICE_H:0)+BOTTOM_PAD;
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
  const FF="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Helvetica Neue',Arial,sans-serif";
  const setFont=(s,w)=>{ctx.font=`${w||'normal'} ${s}px ${FF}`;};
  const C={bg:'#F4F4F6',card:'#FFFFFF',text:'#111111',muted:'#8E8E93',label:'#666666',line:'#E9E9EC',blue:'#0071E3',blueBg:'#EBF3FF',red:'#E53E3E'};
  const drawCard=(x,y,w,h)=>{ctx.save();ctx.shadowColor='rgba(17,17,17,.035)';ctx.shadowBlur=8;ctx.shadowOffsetY=2;ctx.fillStyle=C.card;roundRectPath(ctx,x,y,w,h,28);ctx.fill();ctx.restore();ctx.strokeStyle=C.line;ctx.lineWidth=1.5;roundRectPath(ctx,x,y,w,h,28);ctx.stroke();};
  const drawSectionLabel=(text,y)=>{ctx.fillStyle=C.label;setFont(28,700);ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(text,cardX+6,y);return y+SECTION_LABEL_H;};
  const drawDivider=(y)=>{ctx.strokeStyle=C.line;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cardX+34,y);ctx.lineTo(cardX+cardW-34,y);ctx.stroke();};
  const drawEmpty=(text,y,h)=>{ctx.fillStyle=C.muted;setFont(28,600);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,W/2,y+h/2);};
  const peopleCount=people.length;
  const perPerson=peopleCount?Math.floor(total/peopleCount):0;

  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
  let y=TOP_PAD;
  ctx.fillStyle=C.text;setFont(48,800);ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('정산 내역',cardX,y);
  const dateStr=formatShareDate(settleDateStart,settleDateEnd);
  if(dateStr){ctx.fillStyle=C.muted;setFont(30,700);ctx.textAlign='right';ctx.fillText(truncateCanvasText(ctx,dateStr,520),cardX+cardW,y+12);}
  y+=HEADER_H;

  y=drawSectionLabel('총 지출금액',y);
  drawCard(cardX,y,cardW,TOTAL_CARD_H);
  const totalDividerY=y+147;
  const totalAmountY=y+81;
  {
    const totalText=(total<0?'−':'')+fmt(Math.abs(total))+'원';
    ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillStyle=total<0?C.red:'#1C1C1E';
    const _maxW=cardW-80;
    ctx.font=`700 68px ${FF}`;
    if(ctx.measureText(totalText).width<=_maxW){
      ctx.fillText(totalText,W/2,totalAmountY);
    }else{
      ctx.font=`700 54px ${FF}`;
      ctx.fillText(truncateCanvasText(ctx,totalText,_maxW),W/2,totalAmountY);
    }
  }
  drawDivider(totalDividerY);
  ctx.fillStyle=C.muted;setFont(28,500);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`총 ${peopleCount}명 · 인당 평균 ${fmt(perPerson)}원`,W/2,y+198);
  y+=TOTAL_CARD_H+SECTION_GAP;

  y=drawSectionLabel('송금',y);
  drawCard(cardX,y,cardW,txnCardH);
  if(!txns.length){
    drawEmpty('송금할 내역이 없어요',y,txnCardH);
  }else{
    txns.forEach((t,i)=>{
      const ry=y+i*TXN_ROW_H+TXN_ROW_H/2;
      const amountText=fmt(t.amt)+'원';
      ctx.fillStyle=C.text;setFont(34,800);ctx.textAlign='right';ctx.textBaseline='middle';
      const amountX=cardX+cardW-38,amountW=ctx.measureText(amountText).width;
      ctx.fillText(amountText,amountX,ry);
      const leftX=cardX+38,maxLeftW=amountX-amountW-34-leftX;
      ctx.fillStyle=C.text;setFont(32,700);ctx.textAlign='left';
      ctx.fillText(truncateCanvasText(ctx,`${t.from} → ${t.to}`,maxLeftW),leftX,ry);
      if(i<txns.length-1)drawDivider(y+(i+1)*TXN_ROW_H);
    });
  }
  y+=txnCardH+SECTION_GAP;

  y=drawSectionLabel('지출 내역',y);
  drawCard(cardX,y,cardW,itemCardH);
  if(!validItems.length){
    drawEmpty('지출 내역이 없어요',y,itemCardH);
  }else{
    validItems.forEach((it,i)=>{
      const ry=y+i*ITEM_ROW_H+ITEM_ROW_H/2;
      const iconX=cardX+68;
      ctx.fillStyle=C.blueBg;ctx.beginPath();ctx.arc(iconX,ry,30,0,Math.PI*2);ctx.fill();
      const iconImg=iconMap.get(getIconSvg(it));
      if(iconImg){ctx.drawImage(iconImg,iconX-15,ry-15,30,30);}
      else{ctx.fillStyle=C.blue;ctx.beginPath();ctx.arc(iconX,ry,6,0,Math.PI*2);ctx.fill();}

      const amountText=fmt(+it.amount)+'원';
      ctx.fillStyle=(+it.amount<0)?C.red:C.text;setFont(34,700);ctx.textAlign='right';ctx.textBaseline='middle';
      const amountX=cardX+cardW-38,amountW=ctx.measureText(amountText).width;
      ctx.fillText(amountText,amountX,ry+2);

      const nameX=cardX+118,maxMainW=amountX-amountW-34-nameX;
      const name=truncateCanvasText(ctx,it.name||'(이름 없음)',maxMainW);
      ctx.fillStyle=C.text;setFont(30,700);ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(name,nameX,ry-22);

      const mems=it.members.length?it.members:people;
      const payerInfo=`${it.payer||''} 결제 · ${mems.join(', ')}`;
      ctx.fillStyle=C.muted;setFont(24,400);
      ctx.fillText(truncateCanvasText(ctx,payerInfo,maxMainW),nameX,ry+26);

      if(i<validItems.length-1)drawDivider(y+(i+1)*ITEM_ROW_H);
    });
  }
  y+=itemCardH;
  if(hasRounding){
    y+=44;ctx.fillStyle='#C0C0C6';setFont(26,600);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('차액은 결제자에게 우선 부담돼요',W/2,y);
  }
  return canvas;
}

async function shareSettleImage(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);if(!total){toast('공유할 정산 내역이 없어요',{type:'error'});return;}
  const inApp=detectInAppBrowser();if(inApp){const ok=confirm(`${inApp.name} 내부 브라우저는 이미지 공유가 제한돼요.\n외부 브라우저에서 열어주세요.\n\n지금 외부 브라우저로 열까요?`);if(ok){openInExternalBrowser();return;}}
  const canvas=await generateSettleCanvas();const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));if(!blob){toast('이미지 생성에 실패했어요',{type:'error'});return;}
  const date=new Date().toISOString().slice(0,10);const filename=`정산_${date}.png`;const file=new File([blob],filename,{type:'image/png'});
  if(navigator.share&&!inApp){try{await navigator.share({files:[file]});return;}catch(e){if(e&&e.name==='AbortError')return;}}
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=filename;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
}
