      // 금액 (우측)
      const amtTxt=fmt(billing)+'원';
      ctx.fillStyle=C.text;setFont(34,800);ctx.textAlign='right';ctx.textBaseline='middle';
      const amtX=cardX+cardW-38;const amtW=ctx.measureText(amtTxt).width;ctx.fillText(amtTxt,amtX,ry);
      // from → to (좌측, 1줄)
      const leftX=cardX+38;
      setFont(32,700);ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle=C.text;
      const fromTxt=t.from||'';ctx.fillText(fromTxt,leftX,ry);
      const fw=ctx.measureText(fromTxt).width;
      const AGAP=20,AH=9,AL=36,headW=AH*1.8;
      const AX=leftX+fw+AGAP,AEX=AX+AL;
      ctx.strokeStyle=C.text;ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(AX,ry);ctx.lineTo(AEX-headW,ry);ctx.stroke();
      ctx.fillStyle=C.text;ctx.beginPath();ctx.moveTo(AEX-headW,ry-AH);ctx.lineTo(AEX,ry);ctx.lineTo(AEX-headW,ry+AH);ctx.closePath();ctx.fill();
      const toStartX=AEX+AGAP;
      const maxToW=amtX-amtW-30-bW-14-toStartX;
      const toTxt=truncateCanvasText(ctx,t.to||'',Math.max(maxToW,40));
      ctx.fillStyle=C.text;ctx.textAlign='left';ctx.fillText(toTxt,toStartX,ry);
      const toW=ctx.measureText(toTxt).width;
      // 배지 (to 바로 옆 인라인)
      const bX=toStartX+toW+14;
      ctx.fillStyle=badgeBg;roundRectPath(ctx,bX,ry-bH/2,bW,bH,bH/2);ctx.fill();
      setFont(22,600);ctx.fillStyle=badgeFg;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(badgeTxt,bX+bph,ry);
      // 입금 일자·금융기관 (배지 바로 오른쪽)
      if(pm.done&&(pm.timestamp||pm.account)){
        const metaParts=[];
        if(pm.timestamp){const[dd,tt]=(pm.timestamp||'').split('T');if(dd){const[y2,m2,d2]=dd.split('-');const tm=tt?tt.slice(0,5):'';metaParts.push(`${y2.slice(2)}.${m2}.${d2}${tm?' '+tm:''}`);}};
        if(pm.account)metaParts.push(pm.account);
        if(metaParts.length){const metaX=bX+bW+14;const maxMetaW=amtX-amtW-30-metaX;if(maxMetaW>30){setFont(22,400);ctx.fillStyle=C.muted;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(truncateCanvasText(ctx,metaParts.join(' '),maxMetaW),metaX,ry);}}
      }
      if(i<txns.length-1)drawDivider(y+(i+1)*TXN_ROW_H);
    });
  }
  y+=txnCardH+32;
  // 푸터
  ctx.fillStyle=C.muted;setFont(24,400);ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`더치페이 ${APP_VERSION}`,W/2,y+FOOTER_H/2);
  return canvas;
}

async function shareHistoryImage(id){
  const rec=loadHistory().find(r=>r.id===id);if(!rec){toast('기록을 찾을 수 없어요',{type:'error'});return;}
  toast('이미지 생성 중…',{type:'info'});
  try{
    const canvas=await generateHistoryCanvas(rec);
    const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));if(!blob){toast('이미지 생성에 실패했어요',{type:'error'});return;}
    const date=(rec.dateStart||'').replace(/-/g,'')||new Date().toISOString().slice(0,10).replace(/-/g,'');
    const filename=`정산내역_${date}.png`;const file=new File([blob],filename,{type:'image/png'});
    if(navigator.share){try{await navigator.share({files:[file]});return;}catch(e2){if(e2&&e2.name==='AbortError')return;}}
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=filename;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(err){toast('이미지 저장에 실패했어요',{type:'error'});}
}

function printHistoryRecord(id){
  const rec=loadHistory().find(r=>r.id===id);if(!rec){toast('기록을 찾을 수 없어요',{type:'error'});return;}
  const fhd=d=>{if(!d)return'';const[yr,m,day]=d.split('-');return`${yr}년 ${+m}월 ${+day}일`;};
  const dateStr=rec.dateEnd&&rec.dateEnd!==rec.dateStart?`${fhd(rec.dateStart)} ~ ${fhd(rec.dateEnd)}`:fhd(rec.dateStart);
  const ppl=rec.people||[];const total=rec.total||0;const perPerson=ppl.length?Math.floor(Math.abs(total)/ppl.length):0;
  const validItems=(rec.items||[]).filter(it=>+it.amount!==0);const txns=rec.txns||[];const pmObj=rec.payments||{};
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const itemsHtml=validItems.map(it=>{const mems=it.members&&it.members.length?it.members.join(', '):ppl.join(', ');return`<tr><td><strong>${esc(it.name||'(이름 없음)')}</strong></td><td class="s">${esc(it.payer||'')} 결제</td><td class="s">${esc(mems)}</td><td class="r">${fmt(+it.amount)}원</td></tr>`;}).join('');
  const txnsHtml=txns.map(t=>{const tkey=`${t.from}|${t.to}`;const pm=pmObj[tkey]||{};const billing=t.amt;const received=pm.done?(pm.amount!=null?+pm.amount:billing):0;const diff=pm.done?received-billing:null;let st='미입금',sc='pending';if(pm.done){if(diff>0){st=`+${fmt(diff)}원 초과`;sc='excess';}else if(diff<0){st=`-${fmt(-diff)}원 부족`;sc='lack';}else{st='✓ 입금완료';sc='done';}}const ts=pm.timestamp?pm.timestamp.replace('T',' ').slice(0,16):'';return`<tr><td>${esc(t.from)} → ${esc(t.to)}</td><td class="r">${fmt(billing)}원</td><td><span class="badge ${sc}">${st}</span></td><td class="s">${ts}</td></tr>`;}).join('');
  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>정산내역 ${dateStr}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,'Apple SD Gothic Neo',Arial,sans-serif;font-size:14px;color:#111;background:#fff;padding:32px;}h1{font-size:28px;font-weight:800;margin-bottom:4px;}.date{color:#888;font-size:14px;margin-bottom:20px;}.hero{background:#f5f5f7;border-radius:14px;padding:22px;text-align:center;margin-bottom:24px;}.hero-total{font-size:40px;font-weight:800;}.hero-sub{color:#888;margin-top:6px;font-size:13px;}.sec{margin-bottom:24px;}.sec-title{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee;}table{width:100%;border-collapse:collapse;}td{padding:10px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}td.r{text-align:right;font-weight:700;white-space:nowrap;}td.s{color:#888;font-size:12px;}.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}.badge.done{background:#e8fbe9;color:#1a7a3c;}.badge.excess{background:#ebf3ff;color:#0055b8;}.badge.lack{background:#ffeeee;color:#e53e3e;}.badge.pending{background:#f0f0f2;color:#888;}.foot{margin-top:24px;text-align:center;color:#bbb;font-size:11px;border-top:1px solid #eee;padding-top:14px;}@media print{body{padding:16px;}}</style></head><body><h1>정산 내역</h1><div class="date">${dateStr} · ${esc(ppl.join(', '))}</div><div class="hero"><div class="hero-total">${fmt(total)}원</div><div class="hero-sub">총 ${ppl.length}명 · 인당 평균 ${fmt(perPerson)}원</div></div><div class="sec"><div class="sec-title">지출 내역</div><table>${itemsHtml||'<tr><td colspan="4" style="color:#888;text-align:center;padding:20px">지출 내역이 없어요</td></tr>'}</table></div><div class="sec"><div class="sec-title">송금 내역</div><table>${txnsHtml||'<tr><td colspan="4" style="color:#888;text-align:center;padding:20px">송금 내역이 없어요</td></tr>'}</table></div><div class="foot">더치페이 ${APP_VERSION}</div><script>window.onload=function(){window.print();}<\/script></body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}else{toast('팝업이 차단됐어요. 브라우저 팝업 허용 후 다시 시도해주세요',{type:'error'});}
}
